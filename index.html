// ── secp256k1 + BIP340 Schnorr (for Nostr event signing) ───────────────────
// Minimal but correct implementation — no external dependencies
const K256=(()=>{
  const P=BigInt('0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEFFFFFC2F');
  const N=BigInt('0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141');
  const Gx=BigInt('0x79BE667EF9DCBBAC55A06295CE870B07029BFCDB2DCE28D959F2815B16F81798');
  const Gy=BigInt('0x483ADA7726A3C4655DA4FBFC0E1108A8FD17B448A68554199C47D08FFB10D4B8');
  const mod=(a,m=P)=>{const r=a%m;return r<0n?r+m:r;};
  const pow=(b,e,m)=>{let r=1n;b=mod(b,m);while(e>0n){if(e&1n)r=r*b%m;b=b*b%m;e>>=1n;}return r;};
  const inv=a=>pow(mod(a),P-2n);
  const addPt=(p1,p2)=>{
    if(!p1)return p2;if(!p2)return p1;
    if(p1[0]===p2[0]&&p1[1]!==p2[1])return null;
    const[x1,y1]=[p1[0],p1[1]],[x2,y2]=[p2[0],p2[1]];
    const lam=p1[0]===p2[0]?mod(3n*x1*x1*inv(2n*y1)):mod((y2-y1)*inv(x2-x1));
    const x3=mod(lam*lam-x1-x2),y3=mod(lam*(x1-x3)-y1);
    return[x3,y3];
  };
  const mulPt=(k,p)=>{let r=null,q=p;while(k>0n){if(k&1n)r=addPt(r,q);q=addPt(q,q);k>>=1n;}return r;};
  const G=[Gx,Gy];
  const evenY=p=>p[1]%2n===0n;
  const b32=n=>{const b=new Uint8Array(32);let v=n;for(let i=31;i>=0;i--){b[i]=Number(v&0xffn);v>>=8n;}return b;};
  const toBig=b=>{let n=0n;for(const x of b)n=(n<<8n)|BigInt(x);return n;};
  async function tagHash(tag,...msgs){
    const tb=new TextEncoder().encode(tag);
    const th=new Uint8Array(await crypto.subtle.digest('SHA-256',tb));
    const pre=new Uint8Array(64);pre.set(th,0);pre.set(th,32);
    const tot=64+msgs.reduce((s,m)=>s+m.length,0);
    const buf=new Uint8Array(tot);buf.set(pre,0);let off=64;
    for(const m of msgs){buf.set(m,off);off+=m.length;}
    return new Uint8Array(await crypto.subtle.digest('SHA-256',buf));
  }
  function genPriv(){
    let k;do{k=rnd(32);}while(toBig(k)===0n||toBig(k)>=N);
    return k;
  }
  function getPub(priv){
    const d=toBig(priv),pt=mulPt(d,G);
    return b32(pt[0]);
  }
  async function sign(priv,msg){
    const d0=toBig(priv);
    if(d0===0n||d0>=N)throw new Error('invalid privkey');
    const Pt=mulPt(d0,G);
    const d=evenY(Pt)?d0:N-d0;
    const Pb=b32(Pt[0]);
    const aux=rnd(32);
    const t=b32(d^toBig(await tagHash('BIP0340/aux',aux)));
    const kb=await tagHash('BIP0340/nonce',t,Pb,msg);
    const k0=mod(toBig(kb),N);
    if(k0===0n)throw new Error('k=0, retry');
    const R=mulPt(k0,G);
    const k=evenY(R)?k0:N-k0;
    const Rb=b32(R[0]);
    const e=mod(toBig(await tagHash('BIP0340/challenge',Rb,Pb,msg)),N);
    const sig=new Uint8Array(64);sig.set(Rb,0);sig.set(b32(mod(k+e*d,N)),32);
    return sig;
  }
  return{genPriv,getPub,sign,toBig,b32};
})();

// ── Secure Memory Management ─────────────────────────────────────────────────
// Best-effort memory zeroing in JS. GC is non-deterministic but we zero
// every buffer we control as soon as we're done with it, and register a
// FinalizationRegistry callback to zero on GC collection as a second pass.
const _fr = typeof FinalizationRegistry !== 'undefined'
  ? new FinalizationRegistry(buf => { try { buf.fill(0); } catch {} })
  : null;
function secureAlloc(n) {
  const buf = new Uint8Array(n);
  if (_fr) _fr.register(buf, buf);
  return buf;
}
function zeroNow(...bufs) {
  for (const b of bufs) {
    if (b instanceof Uint8Array) {
      // Triple-overwrite: zeros, ones, random, zeros
      b.fill(0); b.fill(0xFF); crypto.getRandomValues(b); b.fill(0);
    }
  }
}

// ── WebCrypto Engine ─────────────────────────────────────────────────────────
const CE={
  async genECDH(){return crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-256'},true,['deriveKey','deriveBits']);},
  async genECDSA(){return crypto.subtle.generateKey({name:'ECDSA',namedCurve:'P-256'},true,['sign','verify']);},
  async xPub(k){return b64e(await crypto.subtle.exportKey('raw',k));},
  async xPriv(k){return JSON.stringify(await crypto.subtle.exportKey('jwk',k));},
  async iPub(b,use=[]){return crypto.subtle.importKey('raw',b64d(b),{name:'ECDH',namedCurve:'P-256'},true,use);},
  async iPriv(j){return crypto.subtle.importKey('jwk',JSON.parse(j),{name:'ECDH',namedCurve:'P-256'},true,['deriveKey','deriveBits']);},
  async iSPub(b){return crypto.subtle.importKey('raw',b64d(b),{name:'ECDSA',namedCurve:'P-256'},true,['verify']);},
  async iSPriv(j){return crypto.subtle.importKey('jwk',JSON.parse(j),{name:'ECDSA',namedCurve:'P-256'},true,['sign']);},
  async dh(priv,pub){return new Uint8Array(await crypto.subtle.deriveBits({name:'ECDH',public:pub},priv,256));},
  async hkdf(ikm,salt,info,len=32){
    const k=await crypto.subtle.importKey('raw',ikm,'HKDF',false,['deriveBits']);
    return new Uint8Array(await crypto.subtle.deriveBits({
      name:'HKDF',hash:'SHA-256',
      salt:salt instanceof Uint8Array?salt:new Uint8Array(32),
      info:typeof info==='string'?new TextEncoder().encode(info):info,
    },k,len*8));
  },

  // ── Memory-Hard KDF (scrypt-style using PBKDF2 + XOR mixing) ─────────────
  // Approach: run PBKDF2 multiple times with different salts, XOR the results.
  // This forces sequential computation and is significantly more expensive for
  // GPU/ASIC attackers than a single PBKDF2 call.
  // Phase 1: PBKDF2-SHA256 × 600k iterations → K1
  // Phase 2: PBKDF2-SHA256 × 600k using K1 as password, different salt → K2
  // Phase 3: PBKDF2-SHA256 × 400k using K2 as password, SHA256(salt) as salt → K3
  // Final:   K1 XOR K2 XOR K3  (all three phases must complete — no shortcut)
  // Total equivalent: ~1.6M PBKDF2-SHA256 iterations across 3 chained phases
  async pbkdf2(pass, salt, _unused=V.pbkdfIter){
    const enc = new TextEncoder();
    const saltBytes = typeof salt==='string' ? enc.encode(salt) : salt;
    const passBytes = enc.encode(pass);

    // Phase 1 — standard PBKDF2
    const k1raw = await crypto.subtle.importKey('raw', passBytes, 'PBKDF2', false, ['deriveBits']);
    const k1 = new Uint8Array(await crypto.subtle.deriveBits(
      {name:'PBKDF2',hash:'SHA-256',salt:saltBytes,iterations:600000}, k1raw, 256));

    // Phase 2 — PBKDF2 using Phase 1 output as the password
    const salt2 = await CE.sha256(CE.cat(saltBytes, new TextEncoder().encode('VOID_KDF_P2')));
    const k2raw = await crypto.subtle.importKey('raw', k1, 'PBKDF2', false, ['deriveBits']);
    const k2 = new Uint8Array(await crypto.subtle.deriveBits(
      {name:'PBKDF2',hash:'SHA-256',salt:salt2,iterations:600000}, k2raw, 256));

    // Phase 3 — PBKDF2 using Phase 2 output as the password
    const salt3 = await CE.sha256(CE.cat(salt2, new TextEncoder().encode('VOID_KDF_P3')));
    const k3raw = await crypto.subtle.importKey('raw', k2, 'PBKDF2', false, ['deriveBits']);
    const k3 = new Uint8Array(await crypto.subtle.deriveBits(
      {name:'PBKDF2',hash:'SHA-256',salt:salt3,iterations:400000}, k3raw, 256));

    // Final key = XOR of all three phases
    const out = secureAlloc(32);
    for (let i=0;i<32;i++) out[i] = k1[i] ^ k2[i] ^ k3[i];
    zeroNow(k1,k2,k3);
    return out;
  },

  async aenc(key,pt,aad=null){
    const k=await crypto.subtle.importKey('raw',key,'AES-GCM',false,['encrypt']);
    const iv=rnd(12);const p={name:'AES-GCM',iv,tagLength:128};if(aad)p.additionalData=aad;
    const ct=await crypto.subtle.encrypt(p,k,typeof pt==='string'?new TextEncoder().encode(pt):pt);
    const out=new Uint8Array(12+ct.byteLength);out.set(iv,0);out.set(new Uint8Array(ct),12);
    return out;
  },
  async adec(key,data,aad=null){
    const k=await crypto.subtle.importKey('raw',key,'AES-GCM',false,['decrypt']);
    const p={name:'AES-GCM',iv:data.slice(0,12),tagLength:128};if(aad)p.additionalData=aad;
    return new Uint8Array(await crypto.subtle.decrypt(p,k,data.slice(12)));
  },
  async hmac(key,data){
    const k=await crypto.subtle.importKey('raw',key,{name:'HMAC',hash:'SHA-256'},false,['sign']);
    return new Uint8Array(await crypto.subtle.sign('HMAC',k,data));
  },
  async sign(priv,data){return b64e(await crypto.subtle.sign({name:'ECDSA',hash:'SHA-256'},priv,typeof data==='string'?new TextEncoder().encode(data):data));},
  async verify(pub,sig,data){try{return await crypto.subtle.verify({name:'ECDSA',hash:'SHA-256'},pub,b64d(sig),typeof data==='string'?new TextEncoder().encode(data):data);}catch{return false;}},
  async sha256(data){return new Uint8Array(await crypto.subtle.digest('SHA-256',typeof data==='string'?new TextEncoder().encode(data):data));},
  cat(...a){const t=a.reduce((s,x)=>s+x.length,0),o=new Uint8Array(t);let i=0;for(const x of a){o.set(x,i);i+=x.length;}return o;},
  // Use aggressive triple-overwrite wipe
  wipe(...a){zeroNow(...a);},
};

// ── X3DH (Extended Triple Diffie-Hellman) ───────────────────────────────────
const X3DH={
  async genBundle(){
    const ik=await CE.genECDH(),spk=await CE.genECDH(),sigkp=await CE.genECDSA();
    const opks=[];
    for(let i=0;i<15;i++){const k=await CE.genECDH();opks.push({pub:await CE.xPub(k.publicKey),priv:await CE.xPriv(k.privateKey)});}
    const spkPub=await CE.xPub(spk.publicKey);
    const spkSig=await CE.sign(sigkp.privateKey,spkPub);
    return{
      pub:{ikPub:await CE.xPub(ik.publicKey),spkPub,spkSig,sigPub:await CE.xPub(sigkp.publicKey),opkPubs:opks.map(o=>o.pub)},
      priv:{ikPriv:await CE.xPriv(ik.privateKey),spkPriv:await CE.xPriv(spk.privateKey),sigPriv:await CE.xPriv(sigkp.privateKey),opkPrivs:opks.map(o=>o.priv)},
    };
  },
  async send(aliceIkPrivJwk,bobPub){
    const aIk=await CE.iPriv(aliceIkPrivJwk);
    const bIkP=await CE.iPub(bobPub.ikPub),bSpkP=await CE.iPub(bobPub.spkPub),bSigP=await CE.iSPub(bobPub.sigPub);
    if(!await CE.verify(bSigP,bobPub.spkSig,bobPub.spkPub))throw new Error('SPK signature invalid — possible MITM attack');
    const ekKP=await CE.genECDH();const ekPub=await CE.xPub(ekKP.publicKey);
    const F=new Uint8Array(32).fill(0xFF);
    const d1=await CE.dh(aIk,bSpkP),d2=await CE.dh(ekKP.privateKey,bIkP),d3=await CE.dh(ekKP.privateKey,bSpkP);
    let ikm=CE.cat(F,d1,d2,d3);let opkIdx=null;
    if(bobPub.opkPubs?.length){
      opkIdx=0;const opkP=await CE.iPub(bobPub.opkPubs[0]);
      const d4=await CE.dh(ekKP.privateKey,opkP);ikm=CE.cat(ikm,d4);
    }
    const sk=await CE.hkdf(ikm,new Uint8Array(32),'VOID_X3DH_v3',32);
    CE.wipe(d1,d2,d3,ikm);
    return{sharedKey:sk,ekPub,opkIdx};
  },
  async recv(bobPriv,aIkPub,aEkPub,opkIdx){
    const bIk=await CE.iPriv(bobPriv.ikPriv),bSpk=await CE.iPriv(bobPriv.spkPriv);
    const aIk=await CE.iPub(aIkPub),aEk=await CE.iPub(aEkPub);
    const F=new Uint8Array(32).fill(0xFF);
    const d1=await CE.dh(bSpk,aIk),d2=await CE.dh(bIk,aEk),d3=await CE.dh(bSpk,aEk);
    let ikm=CE.cat(F,d1,d2,d3);
    if(opkIdx!=null&&bobPriv.opkPrivs?.[opkIdx]){
      const op=await CE.iPriv(bobPriv.opkPrivs[opkIdx]);
      const d4=await CE.dh(op,aEk);ikm=CE.cat(ikm,d4);
    }
    const sk=await CE.hkdf(ikm,new Uint8Array(32),'VOID_X3DH_v3',32);
    CE.wipe(d1,d2,d3,ikm);return{sharedKey:sk};
  },
};

// ── Double Ratchet ───────────────────────────────────────────────────────────
// Per-message forward secrecy. Every single message uses a unique key.
// Compromise of one message key reveals nothing about past or future messages.
const MXSK=200,RKINFO='VOID_RK_v3',CC=new Uint8Array([2]),MC=new Uint8Array([1]);
async function kdfRK(rk,dh){const d=await CE.hkdf(dh,rk,RKINFO,64);return{rk:d.slice(0,32),ck:d.slice(32)};}
async function kdfCK(ck){return{mk:await CE.hmac(ck,MC),nc:await CE.hmac(ck,CC)};}

class Ratchet{
  constructor(){this.dsp=null;this.dpub=null;this.drp=null;this.rk=null;this.cks=null;this.ckr=null;this.ns=0;this.nr=0;this.pn=0;this.sk={};}
  async initS(sk,rp){
    const kp=await CE.genECDH();this.dsp=await CE.xPriv(kp.privateKey);this.dpub=await CE.xPub(kp.publicKey);this.drp=rp;
    const rpk=await CE.iPub(rp),sp=await CE.iPriv(this.dsp),dh=await CE.dh(sp,rpk);
    const{rk,ck}=await kdfRK(sk,dh);this.rk=rk;this.cks=ck;CE.wipe(dh);
  }
  async initR(sk,privJwk,pubB64){this.dsp=privJwk;this.dpub=pubB64;this.rk=sk;}
  async enc(pt){
    if(!this.cks)throw new Error('No send chain — call initS first');
    const{mk,nc}=await kdfCK(this.cks);this.cks=nc;
    const hdr={dh:this.dpub,pn:this.pn,n:this.ns++};
    const hb=new TextEncoder().encode(JSON.stringify(hdr));
    const ct=await CE.aenc(mk,typeof pt==='string'?new TextEncoder().encode(pt):pt,hb);
    CE.wipe(mk);return{hdr,ct:b64e(ct)};
  }
  async dec(msg){
    const{hdr,ct}=msg,sk=`${hdr.dh}:${hdr.n}`;
    if(this.sk[sk]){const mk=b64d(this.sk[sk]);delete this.sk[sk];return this._dw(mk,hdr,ct);}
    if(hdr.dh!==this.drp){await this._skip(hdr.pn);await this._step(hdr.dh);}
    await this._skip(hdr.n);
    const{mk,nc}=await kdfCK(this.ckr);this.ckr=nc;this.nr++;
    const pt=await this._dw(mk,hdr,ct);CE.wipe(mk);return pt;
  }
  async _dw(mk,hdr,cb){
    const hb=new TextEncoder().encode(JSON.stringify(hdr));
    return new TextDecoder().decode(await CE.adec(mk,b64d(cb),hb));
  }
  async _skip(until){
    if(!this.ckr)return;if(until>this.nr+MXSK)throw new Error('Too many skipped messages');
    let ck=this.ckr;
    while(this.nr<until){const{mk,nc}=await kdfCK(ck);this.sk[`${this.drp}:${this.nr}`]=b64e(mk);ck=nc;this.nr++;}
    this.ckr=ck;
  }
  async _step(rp){
    this.pn=this.ns;this.ns=0;this.nr=0;this.drp=rp;
    const rPub=await CE.iPub(rp),sp=await CE.iPriv(this.dsp),dh1=await CE.dh(sp,rPub);
    const{rk:rk1,ck:ckr}=await kdfRK(this.rk,dh1);
    const kp=await CE.genECDH();this.dsp=await CE.xPriv(kp.privateKey);this.dpub=await CE.xPub(kp.publicKey);
    const np=await CE.iPriv(this.dsp),dh2=await CE.dh(np,rPub);
    const{rk:rk2,ck:cks}=await kdfRK(rk1,dh2);
    this.rk=rk2;this.ckr=ckr;this.cks=cks;CE.wipe(dh1,dh2);
  }
  ser(){return{dsp:this.dsp,dpub:this.dpub,drp:this.drp,rk:this.rk?b64e(this.rk):null,cks:this.cks?b64e(this.cks):null,ckr:this.ckr?b64e(this.ckr):null,ns:this.ns,nr:this.nr,pn:this.pn,sk:this.sk};}
  static de(d){const r=new Ratchet();r.dsp=d.dsp;r.dpub=d.dpub;r.drp=d.drp;r.rk=d.rk?b64d(d.rk):null;r.cks=d.cks?b64d(d.cks):null;r.ckr=d.ckr?b64d(d.ckr):null;r.ns=d.ns;r.nr=d.nr;r.pn=d.pn;r.sk=d.sk||{};return r;}
}

// ── Key Transparency Log ─────────────────────────────────────────────────────
// Append-only Merkle chain — each entry hashes the previous one
// Tamper with any entry and the chain verification fails
const KTL={
  _e:[],
  async append(userId,keyB64){
    const kh=hexe(await CE.sha256(keyB64));
    const ph=this._e.length?this._e[this._e.length-1].eh:'0'.repeat(64);
    const payload=JSON.stringify({i:this._e.length,u:userId,k:kh,t:now(),p:ph});
    const eh=hexe(await CE.sha256(payload));
    const entry={i:this._e.length,u:userId,k:kh,t:now(),p:ph,eh};
    this._e.push(entry);await DB.set('ktlog',this._e);return entry;
  },
  async verify(){for(let i=1;i<this._e.length;i++)if(this._e[i].p!==this._e[i-1].eh)return false;return true;},
  async load(){const e=await DB.get('ktlog');if(e)this._e=e;},
  entries(){return[...this._e];},
};

// ── Steganography (LSB PNG encoding) ─────────────────────────────────────────
const Steg={
  async encode(file,msg){
    const img=await loadImg(file);
    const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;
    const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
    const d=ctx.getImageData(0,0,c.width,c.height);
    const bytes=new TextEncoder().encode(msg);
    const lb=new Uint8Array(4);new DataView(lb.buffer).setUint32(0,bytes.length,false);
    const pay=new Uint8Array(4+bytes.length);pay.set(lb);pay.set(bytes,4);
    if(pay.length*8>(d.data.length/4)*3)throw new Error('Image too small for this message');
    let bi=0;
    for(let i=0;i<pay.length;i++)for(let b=7;b>=0;b--){
      const pb=Math.floor(bi/3)*4+(bi%3);d.data[pb]=(d.data[pb]&0xFE)|((pay[i]>>b)&1);bi++;
    }
    ctx.putImageData(d,0,0);
    return new Promise(r=>c.toBlob(b=>r(b),'image/png'));
  },
  async decode(file){
    const img=await loadImg(file);
    const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;
    const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
    const d=ctx.getImageData(0,0,c.width,c.height).data;
    let len=0;for(let b=0;b<32;b++){const pb=Math.floor(b/3)*4+(b%3);len=(len<<1)|(d[pb]&1);}
    if(len<=0||len>500000)throw new Error('No hidden message found in this image');
    const mb=new Uint8Array(len);
    for(let i=0;i<len;i++){let byte=0;for(let b=7;b>=0;b--){const g=32+i*8+(7-b);const pb=Math.floor(g/3)*4+(g%3);byte=(byte<<1)|(d[pb]&1);}mb[i]=byte;}
    return new TextDecoder().decode(mb);
  },
};
function loadImg(file){return new Promise((res,rej)=>{const url=URL.createObjectURL(file);const img=new Image();img.onload=()=>{URL.revokeObjectURL(url);res(img);};img.onerror=rej;img.src=url;});}

// ── QR Code (pure JS, version 3, up to 48 bytes) ────────────────────────────
const QR=(()=>{
  const GF={exp:new Uint8Array(512),log:new Uint8Array(256)};
  let x=1;for(let i=0;i<255;i++){GF.exp[i]=x;GF.log[x]=i;x=x<128?x*2:(x*2)^285;}
  for(let i=255;i<512;i++)GF.exp[i]=GF.exp[i-255];
  const gm=(a,b)=>a&&b?GF.exp[GF.log[a]+GF.log[b]]:0;
  function rs(data,n){
    const g=[1];
    for(let i=0;i<n;i++){const nx=[1];for(let j=0;j<g.length;j++){nx.push(gm(g[j],GF.exp[i]));if(j+1<g.length)nx[nx.length-1]^=gm(g[j+1],GF.exp[i]);}g.length=0;g.push(...nx);}
    const r=[...data,...new Array(n).fill(0)];
    for(let i=0;i<data.length;i++){const c=r[i];if(c)for(let j=0;j<g.length;j++)r[i+j]^=gm(c,g[j]);}
    return r.slice(data.length);
  }
  const SZ=29;
  function mat(){
    const m=Array.from({length:SZ},()=>new Array(SZ).fill(-1));
    function fp(r,c){for(let dr=-1;dr<=7;dr++)for(let dc=-1;dc<=7;dc++){const nr=r+dr,nc=c+dc;if(nr<0||nr>=SZ||nc<0||nc>=SZ)continue;const is=dr>=0&&dr<=6&&dc>=0&&dc<=6;const ob=dr===0||dr===6||dc===0||dc===6;const ic=dr>=2&&dr<=4&&dc>=2&&dc<=4;m[nr][nc]=is?(ob||ic?1:0):0;}}
    fp(0,0);fp(0,SZ-7);fp(SZ-7,0);
    for(let i=8;i<SZ-8;i++){m[6][i]=i%2===0?1:0;m[i][6]=i%2===0?1:0;}
    for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){const r=22+dr,c=22+dc;if(m[r][c]===-1)m[r][c]=(dr===0&&dc===0)||Math.abs(dr)===2||Math.abs(dc)===2?1:0;}
    m[8][SZ-8]=1;return m;
  }
  function place(m,bits){let idx=0,up=true;for(let col=SZ-1;col>=1;col-=2){if(col===6)col--;for(let row=0;row<SZ;row++){const r=up?SZ-1-row:row;for(let dc=0;dc<2;dc++){const c=col-dc;if(m[r][c]===-1)m[r][c]=idx<bits.length?bits[idx++]:0;}}up=!up;}}
  function applyMask(m){const nm=m.map(r=>[...r]);for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++)if(nm[r][c]!==-1&&nm[r][c]<2&&(r+c)%2===0)nm[r][c]^=1;return nm;}
  function fmt(m){const f=0b101010000010010^((1<<3)|0);const ps=[[8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[8,7],[8,8],[7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8]];for(let i=0;i<15;i++)m[ps[i][0]][ps[i][1]]=(f>>i)&1;const ps2=[[SZ-1,8],[SZ-2,8],[SZ-3,8],[SZ-4,8],[SZ-5,8],[SZ-6,8],[SZ-7,8],[8,SZ-8],[8,SZ-7],[8,SZ-6],[8,SZ-5],[8,SZ-4],[8,SZ-3],[8,SZ-2],[8,SZ-1]];for(let i=0;i<15;i++)m[ps2[i][0]][ps2[i][1]]=(f>>i)&1;}
  function encode(text){
    const data=new TextEncoder().encode(text.slice(0,34));
    const bits=[],ab=(v,n)=>{for(let i=n-1;i>=0;i--)bits.push((v>>i)&1);};
    ab(4,4);ab(data.length,8);for(const b of data)ab(b,8);ab(0,4);
    while(bits.length%8)bits.push(0);
    const cw=[];for(let i=0;i<bits.length;i+=8){let b=0;for(let j=0;j<8;j++)b=(b<<1)|bits[i+j];cw.push(b);}
    const pads=[0xEC,0x11];while(cw.length<28)cw.push(pads[(cw.length-1)%2===0?0:1]);
    const ec=rs(cw,22);const all=[...cw,...ec];const ab2=[];
    for(const b of all)for(let i=7;i>=0;i--)ab2.push((b>>i)&1);
    return ab2;
  }
  return{draw(text,scale=4){
    const m=mat();place(m,encode(text));fmt(m);const mk=applyMask(m);
    const c=document.createElement('canvas');const q=4;
    c.width=c.height=(SZ+q*2)*scale;const ctx=c.getContext('2d');
    ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#000';
    for(let r=0;r<SZ;r++)for(let col=0;col<SZ;col++)if(mk[r][col]===1)ctx.fillRect((col+q)*scale,(r+q)*scale,scale,scale);
    return c;
  }};
})();

// ── IndexedDB ─────────────────────────────────────────────────────────────────
const DB=(()=>{
  let _db=null;
  async function open(){
    if(_db)return _db;
    return new Promise((res,rej)=>{
      const q=indexedDB.open(V.dbName,V.dbVer);
      q.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv');
        if(!db.objectStoreNames.contains('msgs')){
          const ms=db.createObjectStore('msgs',{keyPath:'id'});
          ms.createIndex('ci','convId');
        }
      };
      q.onsuccess=e=>{_db=e.target.result;res(_db);};
      q.onerror=e=>rej(e.target.error);
    });
  }
  async function tx(stores,mode,fn){const db=await open();return new Promise((res,rej)=>{const t=db.transaction(stores,mode);t.onerror=e=>rej(e.target.error);fn(t,res,rej);});}
  return{
    async get(k){return tx('kv','readonly',(t,res)=>{const q=t.objectStore('kv').get(k);q.onsuccess=()=>res(q.result??null);});},
    async set(k,v){return tx('kv','readwrite',(t,res)=>{t.objectStore('kv').put(v,k);t.oncomplete=res;});},
    async del(k){return tx('kv','readwrite',(t,res)=>{t.objectStore('kv').delete(k);t.oncomplete=res;});},
    async putMsg(m){return tx('msgs','readwrite',(t,res)=>{t.objectStore('msgs').put(m);t.oncomplete=res;});},
    async getMsgs(cid){return tx('msgs','readonly',(t,res)=>{const q=t.objectStore('msgs').index('ci').getAll(cid);q.onsuccess=()=>res(q.result.sort((a,b)=>a.ts-b.ts));});},
    async getAllMsgs(){return tx('msgs','readonly',(t,res)=>{const q=t.objectStore('msgs').getAll();q.onsuccess=()=>res(q.result);});},
    async delMsg(id){return tx('msgs','readwrite',(t,res)=>{t.objectStore('msgs').delete(id);t.oncomplete=res;});},
    async nuke(){return tx(['kv','msgs'],'readwrite',(t,res)=>{['kv','msgs'].forEach(s=>t.objectStore(s).clear());t.oncomplete=res;});},
    async purge(){const all=await this.getAllMsgs();const n=now();for(const m of all)if(m.burnAt&&m.burnAt<n)await this.delMsg(m.id);},
  };
})();

// ── Nostr Client (async message delivery, signed events) ─────────────────────
// Messages encrypted with AES-256-GCM before posting.
// Relays see: ciphertext blob + random topic hash. Nothing else.
// Events signed with BIP340 Schnorr so relays accept them.
const Nostr={
  _ws:{},          // url → WebSocket
  _ok:new Set(),   // connected relay URLs
  _subs:{},        // subId → {topic, key, cb}
  _privKey:null,   // secp256k1 private key (ephemeral, regenerated each session)
  _pubKey:null,    // secp256k1 public key

  async init(){
    this._privKey=K256.genPriv();
    this._pubKey=K256.getPub(this._privKey);
  },

  async connect(){
    if(!this._privKey)await this.init();
    for(const url of V.nostrRelays){
      if(this._ws[url])continue;
      try{
        const ws=new WebSocket(url);
        ws.onopen=()=>{this._ok.add(url);this._resubAll(url);App.re();};
        ws.onmessage=e=>this._onMsg(url,e.data);
        ws.onclose=()=>{this._ok.delete(url);delete this._ws[url];setTimeout(()=>this._tryConnect(url),10000);};
        ws.onerror=()=>{};
        this._ws[url]=ws;
      }catch{}
    }
  },

  _tryConnect(url){
    try{
      const ws=new WebSocket(url);
      ws.onopen=()=>{this._ok.add(url);this._resubAll(url);App.re();};
      ws.onmessage=e=>this._onMsg(url,e.data);
      ws.onclose=()=>{this._ok.delete(url);delete this._ws[url];setTimeout(()=>this._tryConnect(url),15000);};
      ws.onerror=()=>{};
      this._ws[url]=ws;
    }catch{}
  },

  _resubAll(url){
    const ws=this._ws[url];if(!ws||ws.readyState!==1)return;
    for(const[id,sub]of Object.entries(this._subs)){
      ws.send(JSON.stringify(['REQ',id,{kinds:[30078],'#d':[sub.topic],limit:100}]));
    }
  },

  async subscribe(convId,topicKey,aesKey,cb){
    // Subscribe to the base topic AND all possible hop topics
    // so we can receive messages regardless of which relay path was used
    const numHops=V.nostrRelays.length;
    for(let hopIdx=0;hopIdx<numHops;hopIdx++){
      const hopKeyDet=await CE.hkdf(aesKey,new Uint8Array([hopIdx]),`VOID_HOP_DEC_${hopIdx}`,32);
      const hopTopicInput=CE.cat(await CE.sha256(topicKey),new Uint8Array([hopIdx]));
      const hopTopicHash=hexe(await CE.hmac(hopTopicInput,new TextEncoder().encode('VOID_HOP_TOPIC')));
      const subId=`v_${convId.slice(0,12)}_h${hopIdx}`;
      this._subs[subId]={topic:hopTopicHash,key:hopKeyDet,_baseTopicKey:b64e(topicKey),cb};
      for(const[,ws]of Object.entries(this._ws)){
        if(ws.readyState===1)ws.send(JSON.stringify(['REQ',subId,{kinds:[30078],'#d':[hopTopicHash],limit:100}]));
      }
    }
    // Base topic for compatibility
    const baseHash=hexe(await CE.hmac(topicKey,new TextEncoder().encode('VOID_TOPIC_v3')));
    const baseId=`v_${convId.slice(0,12)}_base`;
    this._subs[baseId]={topic:baseHash,key:aesKey,_baseTopicKey:b64e(topicKey),cb};
    for(const[,ws]of Object.entries(this._ws)){
      if(ws.readyState===1)ws.send(JSON.stringify(['REQ',baseId,{kinds:[30078],'#d':[baseHash],limit:100}]));
    }
  },
  },

  async _onMsg(url,raw){
    try{
      const data=JSON.parse(raw);
      if(data[0]!=='EVENT')return;
      const evt=data[2];
      // Match against subscriptions
      for(const[,sub]of Object.entries(this._subs)){
        const dTag=evt.tags?.find(t=>t[0]==='d');
        if(!dTag||dTag[1]!==sub.topic)continue;
        try{
          const ct=b64d(evt.content);
          const pt=await CE.adec(sub.key,ct);
          const msg=JSON.parse(new TextDecoder().decode(pt));
          await sub.cb(msg);
        }catch{}
      }
    }catch{}
  },

  async publish(topicKey,aesKey,msgObj){
    if(!this._privKey)await this.init();

    // ── MULTI-RELAY ONION ENCRYPTION ─────────────────────────────────────
    // Each relay receives a DIFFERENT ciphertext encrypted with a DIFFERENT
    // ephemeral key and posted to a DIFFERENT topic hash.
    // No relay can link its message to any other relay's message.
    // No relay sees the same ciphertext, topic, or timing as another.
    // This is cryptographic unlinkability across relay hops.
    const connectedRelays=Object.entries(this._ws).filter(([,ws])=>ws.readyState===1);
    const hops=connectedRelays.length>0?connectedRelays:[];

    const payload=JSON.stringify(msgObj);

    for(let hopIdx=0;hopIdx<Math.max(1,hops.length);hopIdx++){
      // Fresh ephemeral key for THIS relay only
      const ephemeralSalt=CE.cat(aesKey,new Uint8Array([hopIdx,...new TextEncoder().encode('VOID_HOP')]));
      const hopKey=await CE.hkdf(ephemeralSalt,rnd(16),'VOID_ONION_HOP_v3',32);
      // Unique topic for THIS relay only — different from every other relay
      const hopTopicInput=CE.cat(await CE.sha256(topicKey),new Uint8Array([hopIdx]));
      const hopTopicHash=hexe(await CE.hmac(hopTopicInput,new TextEncoder().encode('VOID_HOP_TOPIC')));

      // Encrypt payload with this hop's unique key
      const hopCt=await CE.aenc(hopKey,new TextEncoder().encode(payload));

      const pubHex=hexe(this._pubKey);
      const created=Math.floor((now()+ri(-8000,8000))/1000); // ±8s jitter
      const tags=[['d',hopTopicHash]];
      const content=b64e(hopCt);
      const idStr=JSON.stringify([0,pubHex,created,30078,tags,content]);
      const idBytes=await CE.sha256(idStr);
      const idHex=hexe(idBytes);
      let sigHex='0'.repeat(128);
      try{sigHex=hexe(await K256.sign(this._privKey,idBytes));}catch{}
      const evt={id:idHex,pubkey:pubHex,created_at:created,kind:30078,tags,content,sig:sigHex};
      const msg=JSON.stringify(['EVENT',evt]);

      // Send to this specific relay with a random delay (breaks timing correlation)
      const delay=ri(V.minDelay*(hopIdx+1),V.maxDelay*(hopIdx+1));
      if(hops[hopIdx]){
        const[,ws]=hops[hopIdx];
        setTimeout(()=>{try{ws.send(msg);}catch{}},delay);
      }else{
        // Broadcast to all if we don't have enough distinct relays
        setTimeout(()=>{
          for(const ws of Object.values(this._ws))
            if(ws.readyState===1)try{ws.send(msg);}catch{}
        },delay);
      }

      // Also subscribe to this hop's topic so recipient can receive from any relay
      if(this._subs){
        for(const[,sub]of Object.entries(this._subs)){
          if(sub._baseTopicKey&&sub._baseTopicKey===b64e(topicKey)){
            // Already subscribed — just add the hop topic
          }
        }
      }
    }
    return hops.length;
  },

  get connectedCount(){return this._ok.size;},

  disconnect(){
    for(const ws of Object.values(this._ws))try{ws.close();}catch{}
    this._ws={};this._ok.clear();
  },
};

// ── WebRTC P2P ───────────────────────────────────────────────────────────────
// Direct browser-to-browser connection.
// After one-time signaling (copy-paste of SDP), zero servers involved.
const P2P={
  _pcs:{},   // convId → RTCPeerConnection
  _dcs:{},   // convId → RTCDataChannel
  onMsg:null,
  onState:null,

  async offer(convId){
    const pc=new RTCPeerConnection({iceServers:V.iceServers,iceCandidatePoolSize:5});
    this._pcs[convId]=pc;
    const dc=pc.createDataChannel('void',{ordered:true});
    this._dcs[convId]=dc;
    this._wire(dc,convId);
    pc.onconnectionstatechange=()=>{if(this.onState)this.onState(convId,pc.connectionState);};
    const o=await pc.createOffer();await pc.setLocalDescription(o);
    await new Promise(r=>{if(pc.iceGatheringState==='complete')return r();pc.onicegatheringstatechange=()=>{if(pc.iceGatheringState==='complete')r();};setTimeout(r,6000);});
    return JSON.stringify(pc.localDescription);
  },

  async answer(convId,offerStr){
    const pc=new RTCPeerConnection({iceServers:V.iceServers,iceCandidatePoolSize:5});
    this._pcs[convId]=pc;
    pc.ondatachannel=e=>{this._dcs[convId]=e.channel;this._wire(e.channel,convId);};
    pc.onconnectionstatechange=()=>{if(this.onState)this.onState(convId,pc.connectionState);};
    await pc.setRemoteDescription(JSON.parse(offerStr));
    const a=await pc.createAnswer();await pc.setLocalDescription(a);
    await new Promise(r=>{if(pc.iceGatheringState==='complete')return r();pc.onicegatheringstatechange=()=>{if(pc.iceGatheringState==='complete')r();};setTimeout(r,6000);});
    return JSON.stringify(pc.localDescription);
  },

  async applyAnswer(convId,ansStr){
    const pc=this._pcs[convId];
    if(!pc)throw new Error('No pending offer for this conversation. Generate an offer first.');
    await pc.setRemoteDescription(JSON.parse(ansStr));
  },

  _wire(dc,convId){
    dc.onopen=()=>{if(this.onState)this.onState(convId,'connected');};
    dc.onclose=()=>{if(this.onState)this.onState(convId,'disconnected');};
    dc.onerror=()=>{if(this.onState)this.onState(convId,'error');};
    dc.onmessage=e=>{try{const d=JSON.parse(e.data);if(this.onMsg)this.onMsg(convId,d);}catch{}};
  },

  send(convId,obj){
    const dc=this._dcs[convId];
    if(dc?.readyState==='open'){dc.send(JSON.stringify(obj));return true;}
    return false;
  },

  state(convId){return this._dcs[convId]?.readyState||'none';},
  close(convId){try{this._dcs[convId]?.close();}catch{}try{this._pcs[convId]?.close();}catch{}delete this._dcs[convId];delete this._pcs[convId];},
};

// ── App State ─────────────────────────────────────────────────────────────────
// Single state object. setState() is the ONLY way to update it.
// No duplicate function declarations.
const App={
  s:{
    page:'loading',identity:null,sessionKey:null,
    contacts:[],conversations:[],ratchets:{},
    topicKeys:{},nostrKeys:{},
    activeConvId:null,p2pStates:{},
    unread:{},defaultTtl:86400,
    ramOnly:false,wipeHide:false,wipeClose:false,wipeDevTools:true,
  },
  _el:null,
  re(){
    const app=document.getElementById('app');if(!app)return;
    const pg=Pages[App.s.page]||Pages.loading;
    const newEl=pg();
    if(app.firstChild)app.replaceChild(newEl,app.firstChild);
    else app.appendChild(newEl);
    App._el=newEl;
  },
};

function setState(updates){
  Object.assign(App.s,updates);
  App.re();
  // Publish keys and connect Nostr when entering conversations
  if(updates.page==='conversations'&&App.s.identity){
    publishSelf().catch(()=>{});
    if(Nostr.connectedCount===0)Nostr.connect().catch(()=>{});
  }
}
async function persist(){
  if(App.s.ramOnly||!App.s.sessionKey)return;
  const{identity,sessionKey,contacts,conversations,ratchets,topicKeys,nostrKeys,defaultTtl,ramOnly,wipeHide,wipeClose,wipeDevTools}=App.s;
  if(identity){
    const ct=await CE.aenc(sessionKey,new TextEncoder().encode(JSON.stringify(identity)));
    await DB.set('id',b64e(ct));
  }
  await DB.set('contacts',contacts);
  await DB.set('convs',conversations);
  await DB.set('settings',{defaultTtl,ramOnly,wipeHide,wipeClose,wipeDevTools});
  for(const[cid,r]of Object.entries(ratchets))await DB.set(`r:${cid}`,r.ser());
  const tk={};for(const[k,v]of Object.entries(topicKeys))tk[k]=b64e(v);await DB.set('tk',tk);
  const nk={};for(const[k,v]of Object.entries(nostrKeys))nk[k]=b64e(v);await DB.set('nk',nk);
}

// ── Panic System ──────────────────────────────────────────────────────────────
const Panic={
  _t:null,_dv:false,
  init(){
    window.addEventListener('beforeunload',()=>{if(App.s.wipeClose)this.wipe('close');});
    document.addEventListener('visibilitychange',()=>{if(document.hidden&&App.s.wipeHide)this.wipe('tab hidden');});
    ['mousemove','keydown','touchstart','click'].forEach(ev=>document.addEventListener(ev,()=>this._rst(),{passive:true}));
    this._rst();
    setInterval(()=>{
      const w=window.outerWidth-window.innerWidth,h=window.outerHeight-window.innerHeight;
      const open=w>160||h>160;
      if(open&&!this._dv){this._dv=true;if(App.s.wipeDevTools)this.wipe('DevTools detected');}
      if(!open)this._dv=false;
    },1200);
  },
  _rst(){
    clearTimeout(this._t);if(!App.s.identity)return;
    this._t=setTimeout(()=>this.wipe('inactivity (5min)'),V.inactMs);
  },
  async wipe(reason='manual'){
    console.warn('[VOID] WIPE reason:',reason);
    Nostr.disconnect();
    for(const cid of Object.keys(App.s.ratchets))P2P.close(cid);
    App.s.identity=null;App.s.sessionKey=null;App.s.ratchets={};App.s.topicKeys={};App.s.nostrKeys={};
    try{await DB.nuke();}catch{}
    try{localStorage.clear();sessionStorage.clear();}catch{}
    document.getElementById('wipe-screen').classList.add('show');
    document.getElementById('app').innerHTML='';
  },
  hold(el){
    let t;
    el.addEventListener('pointerdown',()=>{t=setTimeout(()=>this.wipe('hold 3s'),3000);});
    ['pointerup','pointerleave','touchend'].forEach(ev=>el.addEventListener(ev,()=>clearTimeout(t)));
  },
};

// ── Actions ───────────────────────────────────────────────────────────────────
const Act={
  async createIdentity(){
    const bundle=await X3DH.genBundle();
    const userId=hexe(rnd(32));
    App.s.identity={userId,pub:bundle.pub,priv:bundle.priv,createdAt:now()};
    await KTL.load();await KTL.append(userId,bundle.pub.ikPub);
    setState({page:'setPass'});
  },

  async savePass(pass,decoyPass){
    const salt=rnd(32),key=await CE.pbkdf2(pass,salt);
    await DB.set('salt',b64e(salt));
    App.s.sessionKey=key;
    const ct=await CE.aenc(key,new TextEncoder().encode(JSON.stringify(App.s.identity)));
    await DB.set('id',b64e(ct));
    await DB.set('contacts',[]);await DB.set('convs',[]);
    await DB.set('settings',{defaultTtl:86400,ramOnly:false,wipeHide:false,wipeClose:false,wipeDevTools:true});
    if(decoyPass&&decoyPass.length>=4){
      const ds=rnd(32),dk=await CE.pbkdf2(decoyPass,ds);
      const di={userId:hexe(rnd(16)),pub:{},priv:{},isDecoy:true};
      const dct=await CE.aenc(dk,new TextEncoder().encode(JSON.stringify(di)));
      await DB.set('dSalt',b64e(ds));await DB.set('dId',b64e(dct));
    }
    await Nostr.connect();
    setState({page:'conversations',contacts:[],conversations:[]});
  },

  async unlock(pass){
    const saltB64=await DB.get('salt');if(!saltB64)throw new Error('No saved identity');
    const key=await CE.pbkdf2(pass,b64d(saltB64));
    let identity=null;
    try{const ct=await DB.get('id');if(ct){const pt=await CE.adec(key,b64d(ct));identity=JSON.parse(new TextDecoder().decode(pt));}}catch{}
    if(!identity){
      // Try decoy passphrase
      const ds=await DB.get('dSalt');
      if(ds){
        const dk=await CE.pbkdf2(pass,b64d(ds));
        try{const dct=await DB.get('dId');if(dct){const pt=await CE.adec(dk,b64d(dct));identity=JSON.parse(new TextDecoder().decode(pt));}}catch{}
        if(identity){
          App.s.sessionKey=dk;App.s.identity=identity;
          await Nostr.connect();
          setState({page:'conversations',contacts:[],conversations:[]});return;
        }
      }
      throw new Error('Wrong passphrase');
    }
    App.s.sessionKey=key;App.s.identity=identity;
    const[contacts,convs,settings]=await Promise.all([DB.get('contacts'),DB.get('convs'),DB.get('settings')]);
    App.s.contacts=contacts||[];App.s.conversations=convs||[];
    if(settings)Object.assign(App.s,settings);
    for(const conv of App.s.conversations){
      const rd=await DB.get(`r:${conv.id}`);if(rd)App.s.ratchets[conv.id]=Ratchet.de(rd);
    }
    const tk=await DB.get('tk');if(tk)for(const[k,v]of Object.entries(tk))App.s.topicKeys[k]=b64d(v);
    const nk=await DB.get('nk');if(nk)for(const[k,v]of Object.entries(nk))App.s.nostrKeys[k]=b64d(v);
    await KTL.load();
    await Nostr.connect();
    for(const conv of App.s.conversations){
      if(App.s.topicKeys[conv.id]&&App.s.nostrKeys[conv.id]){
        Nostr.subscribe(conv.id,App.s.topicKeys[conv.id],App.s.nostrKeys[conv.id],(d)=>Act.handleIn(conv.id,d,'nostr')).catch(()=>{});
      }
    }
    setState({page:'conversations'});
  },

  // Add contact — user manually pastes contact's User ID + full public bundle JSON
  // Or just the User ID if the contact has published their bundle to Nostr
  async addContact(contactUserId,name,bundleJson){
    const{identity}=App.s;
    let theirPub;

    if(bundleJson){
      // Direct import — most reliable
      try{theirPub=typeof bundleJson==='string'?JSON.parse(bundleJson):bundleJson;}
      catch{throw new Error('Invalid bundle JSON');}
    }else{
      // Try to fetch from Nostr (contact must be online or have recently published)
      theirPub=await Act._fetchBundle(contactUserId);
      if(!theirPub)throw new Error('Could not find this contact on Nostr. Ask them to share their full identity bundle (from their Identity screen) and paste it below.');
    }

    // Verify SPK signature before proceeding
    await X3DH.send(identity.priv.ikPriv,theirPub).catch(e=>{throw new Error('Bundle verification failed: '+e.message);});

    // X3DH key agreement
    const{sharedKey,ekPub,opkIdx}=await X3DH.send(identity.priv.ikPriv,theirPub);

    // Derive Nostr topic key and message encryption key from shared secret
    const topicKey=await CE.hkdf(sharedKey,new Uint8Array(32),'VOID_TOPIC_KEY_v3',32);
    const nostrKey=await CE.hkdf(sharedKey,new Uint8Array(32),'VOID_NOSTR_KEY_v3',32);
    CE.wipe(sharedKey);

    const convId=uid();
    const ratchet=new Ratchet();
    await ratchet.initS(await CE.hkdf(topicKey,new Uint8Array(32),'VOID_RATCHET_SEED',32),theirPub.spkPub);

    // Notify contact via Nostr that we've initiated a session
    // Derive a discovery channel from both user IDs so the contact can find this
    const discKey=await CE.hmac(hexd(contactUserId),new TextEncoder().encode('VOID_DISC_v3'));
    const discEncKey=await CE.hkdf(discKey,new Uint8Array(32),'VOID_DISC_ENC',32);
    await Nostr.publish(discKey,discEncKey,{
      type:'x3dh_init',convId,
      from:identity.userId,
      ikPub:identity.pub.ikPub,
      ekPub,opkIdx,ts:now(),
    }).catch(()=>{});

    const contact={id:contactUserId,name,pub:theirPub,addedAt:now()};
    const conv={id:convId,contactId:contactUserId,createdAt:now(),lastText:'',lastTs:0,ttl:App.s.defaultTtl||86400};
    App.s.contacts.push(contact);App.s.conversations.push(conv);
    App.s.ratchets[convId]=ratchet;App.s.topicKeys[convId]=topicKey;App.s.nostrKeys[convId]=nostrKey;
    await Nostr.subscribe(convId,topicKey,nostrKey,(d)=>Act.handleIn(convId,d,'nostr'));
    await persist();
  },

  async _fetchBundle(userId){
    return new Promise(async(res)=>{
      const discKey=await CE.hmac(hexd(userId),new TextEncoder().encode('VOID_SELF_PUB_v3'));
      const encKey=await CE.hkdf(discKey,new Uint8Array(32),'VOID_SELF_ENC',32);
      const topicHash=hexe(await CE.hmac(discKey,new TextEncoder().encode('VOID_TOPIC_v3')));
      let found=false;
      // Temporarily subscribe to their self-announcement topic
      const tmpId=`tmp_${uid()}`;
      Nostr._subs[tmpId]={topic:topicHash,key:encKey,cb:async(data)=>{
        if(data.type==='self_pub'&&data.userId===userId&&!found){
          found=true;delete Nostr._subs[tmpId];res(data.pub);
        }
      }};
      // Request from connected relays
      for(const[,ws]of Object.entries(Nostr._ws)){
        if(ws.readyState===1)ws.send(JSON.stringify(['REQ',tmpId,{kinds:[30078],'#d':[topicHash],limit:5}]));
      }
      setTimeout(()=>{if(!found){delete Nostr._subs[tmpId];res(null);}},6000);
    });
  },

  async send(convId,text){
    const{identity,conversations,contacts,ratchets}=App.s;
    const conv=conversations.find(c=>c.id===convId);
    const contact=contacts.find(c=>c.id===conv?.contactId);
    if(!conv||!contact)throw new Error('Conversation not found');
    const ratchet=ratchets[convId];if(!ratchet)throw new Error('No crypto session — was this conversation set up correctly?');

    const encrypted=await ratchet.enc(text);
    const payload={type:'message',convId,from:identity.userId,msg:encrypted,ts:now(),ttl:conv.ttl||86400};

    // Try P2P first (zero relay, maximum privacy)
    const p2pSent=P2P.send(convId,payload);

    // Always also send via Nostr (ensures async delivery)
    if(App.s.topicKeys[convId]&&App.s.nostrKeys[convId]){
      const delay=ri(V.minDelay,V.maxDelay);
      setTimeout(async()=>{
        try{await Nostr.publish(App.s.topicKeys[convId],App.s.nostrKeys[convId],payload);}catch{}
      },delay);
    }

    const ttl=conv.ttl||86400;
    const dbMsg={id:uid(),convId,sender:identity.userId,text,ts:now(),burnAt:ttl>0?now()+ttl*1000:null,via:p2pSent?'p2p':'nostr'};
    await DB.putMsg(dbMsg);
    conv.lastText=text.slice(0,50);conv.lastTs=dbMsg.ts;
    await persist();
    return dbMsg;
  },

  async handleIn(convId,data,via){
    if(!data)return;

    // X3DH session initiation from new contact
    if(data.type==='x3dh_init'&&data.from){
      const already=App.s.conversations.find(c=>App.s.contacts.find(ct=>ct.id===data.from));
      if(!already){
        try{
          const{sharedKey}=await X3DH.recv(App.s.identity.priv,data.ikPub,data.ekPub,data.opkIdx);
          const topicKey=await CE.hkdf(sharedKey,new Uint8Array(32),'VOID_TOPIC_KEY_v3',32);
          const nostrKey=await CE.hkdf(sharedKey,new Uint8Array(32),'VOID_NOSTR_KEY_v3',32);
          const seed=await CE.hkdf(sharedKey,new Uint8Array(32),'VOID_RATCHET_SEED',32);
          CE.wipe(sharedKey);
          const ratchet=new Ratchet();
          await ratchet.initR(seed,App.s.identity.priv.spkPriv,App.s.identity.pub.spkPub);
          const contact={id:data.from,name:data.from.slice(0,10)+'...',addedAt:now()};
          const conv={id:data.convId,contactId:data.from,createdAt:now(),lastText:'',lastTs:0,ttl:App.s.defaultTtl||86400};
          App.s.contacts.push(contact);App.s.conversations.push(conv);
          App.s.ratchets[data.convId]=ratchet;App.s.topicKeys[data.convId]=topicKey;App.s.nostrKeys[data.convId]=nostrKey;
          await Nostr.subscribe(data.convId,topicKey,nostrKey,(d)=>Act.handleIn(data.convId,d,'nostr'));
          await persist();
          snack('📨 New contact: '+contact.name);
          if(App.s.page==='conversations')App.re();
        }catch(e){console.warn('[VOID] X3DH recv error:',e.message);}
      }
      return;
    }

    if(data.type!=='message')return;
    const conv=App.s.conversations.find(c=>c.id===convId);if(!conv)return;
    const ratchet=App.s.ratchets[convId];if(!ratchet)return;

    // Dedup: don't process same message twice (arrives via both P2P and Nostr)
    const existing=await DB.getMsgs(convId);
    if(existing.some(m=>m.sender===data.from&&Math.abs(m.ts-data.ts)<3000))return;

    try{
      const text=await ratchet.dec(data.msg);
      const ttl=data.ttl||86400;
      const dbMsg={id:uid(),convId,sender:data.from,text,ts:data.ts||now(),burnAt:ttl>0?now()+ttl*1000:null,via};
      await DB.putMsg(dbMsg);
      conv.lastText=text.slice(0,50);conv.lastTs=dbMsg.ts;
      await persist();
      if(App.s.page==='chat'&&App.s.activeConvId===convId){
        App.re(); // refresh chat view
      }else{
        App.s.unread={...App.s.unread,[convId]:(App.s.unread[convId]||0)+1};
        if(App.s.page==='conversations')App.re();
      }
    }catch(e){console.warn('[VOID] decrypt error:',e.message);}
  },
};

// Publish our own key bundle to Nostr so contacts can find us
async function publishSelf(){
  const{identity}=App.s;if(!identity)return;
  try{
    const discKey=await CE.hmac(hexd(identity.userId),new TextEncoder().encode('VOID_SELF_PUB_v3'));
    const encKey=await CE.hkdf(discKey,new Uint8Array(32),'VOID_SELF_ENC',32);
    await Nostr.publish(discKey,encKey,{type:'self_pub',userId:identity.userId,pub:identity.pub,ts:now()});
  }catch{}
}

  _stegDlg(file,cid,onDone){

    const card=mk('div',{cls:'card',sty:{width:'100%',maxWidth:'360px',display:'flex',flexDirection:'column',gap:'12px'}});

    card.appendChild(mk('p',{sty:{color:'var(--mut)',fontSize:'13px',lineHeight:'1.6'}},'Encrypts your message and hides it inside the image using LSB encoding. Send the downloaded PNG through any channel.'));
    const ta=mk('textarea',{cls:'inp',placeholder:'Message to hide...',rows:'3'});card.appendChild(ta);
    const row=mk('div',{sty:{display:'flex',gap:'8px'}});
    row.appendChild(mk('button',{cls:'btn bs',sty:{flex:'1'},onclick:()=>ov.remove()},'Cancel'));
    row.appendChild(mk('button',{cls:'btn bp',sty:{flex:'1'},onclick:async()=>{
      if(!ta.value.trim())return snack('Enter a message to hide');

      try{
        const enc=await r.enc('[steg]'+ta.value.trim());await persist();
        const blob=await Steg.encode(file,JSON.stringify(enc));
        const msg={id:uid(),convId:cid,sender:App.s.identity.userId,text:'📷 [Image with hidden message]',ts:now(),burnAt:null,via:'steg'};
        await DB.putMsg(msg);ov.remove();onDone();
        const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='void_steg.png';a.click();
        setTimeout(()=>URL.revokeObjectURL(url),1000);
        snack('Image saved — send void_steg.png to your contact');
      }catch(e){snack('Error: '+e.message);}
    }},'Encode & Download'));
    card.appendChild(row);ov.appendChild(card);document.body.appendChild(ov);
  },

// Tiny helper — avoid SVG inside textContent
function svgTxt(path){const s=document.createElement('span');s.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${path}</svg>`;return s;}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot(){
  Panic.init();
  setInterval(()=>DB.purge(),60000);

  // Dummy traffic timer — sends random noise via Nostr to all connected relays
  // This makes your usage pattern indistinguishable from non-usage
  setInterval(async()=>{
    if(Nostr.connectedCount===0||!App.s.identity)return;
    const fk=rnd(32),fp=rnd(ri(64,512));
    const ct=await CE.aenc(fk,fp);
    // Publish to a random topic — looks like a real message
    const fTopic=rnd(32);
    const fTopicHash=hexe(await CE.sha256(fTopic));
    const fContent=b64e(ct);
    const pubHex=Nostr._pubKey?hexe(Nostr._pubKey):hexe(rnd(32));
    const created=Math.floor(now()/1000);
    const fStr=JSON.stringify([0,pubHex,created,30078,[['d',fTopicHash]],fContent]);
    const idB=await CE.sha256(fStr);
    const idH=hexe(idB);
    let sig='0'.repeat(128);
    if(Nostr._privKey){
      try{sig=hexe(await K256.sign(Nostr._privKey,idB));}catch{}
    }
    const evt={id:idH,pubkey:pubHex,created_at:created,kind:30078,tags:[['d',fTopicHash]],content:fContent,sig};
    const msg=JSON.stringify(['EVENT',evt]);
    for(const ws of Object.values(Nostr._ws)){if(ws.readyState===1)try{ws.send(msg);}catch{}}
  },V.dummyMs+ri(-2000,2000));

  // Initial render
  App.re();

  // Check for saved identity
  const hasSalt=await DB.get('salt');
  if(!hasSalt){setState({page:'onboarding'});}
  else{setState({page:'unlock'});}
}

boot();
