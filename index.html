<!DOCTYPE html>

<style>

<script>
// VOID v3.1 — Zero-Knowledge P2P Secure Messaging
// Fixed: mobile b64e crash, Samsung Internet compat, full error recovery

// ── Safe b64 helpers (NO spread operator — crashes mobile browsers) ──────────
function b64e(buf){
  // Loop-based — safe on all browsers including Samsung Internet
  const bytes=new Uint8Array(buf);
  let str='';
  for(let i=0;i<bytes.length;i++) str+=String.fromCharCode(bytes[i]);
  return btoa(str);
}
function b64d(s){
  const raw=atob(s.replace(/-/g,'+').replace(/_/g,'/'));
  const out=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) out[i]=raw.charCodeAt(i);
  return out;
}
function hexe(buf){
  const bytes=new Uint8Array(buf);
  let s='';
  for(let i=0;i<bytes.length;i++) s+=(bytes[i]<16?'0':'')+bytes[i].toString(16);
  return s;
}
function hexd(s){
  const out=new Uint8Array(s.length>>1);
  for(let i=0;i<out.length;i++) out[i]=parseInt(s.slice(i*2,i*2+2),16);
  return out;
}

// ── Utils ────────────────────────────────────────────────────────────────────
const rnd=n=>crypto.getRandomValues(new Uint8Array(n));

const now=()=>Date.now();
const ri=(lo,hi)=>lo+Math.floor(Math.random()*(hi-lo+1));
function fmtTime(ts){
  const d=new Date(ts),n=new Date();
  return d.toDateString()===n.toDateString()
    ?d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
    :d.toLocaleDateString([],{month:'short',day:'numeric'});
}
function snack(msg,ms=2800){
  const s=document.getElementById('snk');
  s.textContent=msg;s.classList.add('show');
  clearTimeout(s._t);s._t=setTimeout(()=>s.classList.remove('show'),ms);
}
function mk(tag,attrs,kids){
  attrs=attrs||{};kids=kids||[];
  const e=document.createElement(tag);
  for(const k in attrs){
    const v=attrs[k];
    if(k==='cls')e.className=v;
    else if(k==='sty'){for(const p in v)e.style[p]=v[p];}
    else if(k==='onclick')e.onclick=v;
    else e.setAttribute(k,v);
  }
  for(let i=0;i<kids.length;i++){
    const c=kids[i];if(c==null)continue;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return e;
}
function svgEl(paths,sz){
  sz=sz||20;
  const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('width',sz);s.setAttribute('height',sz);
  s.setAttribute('viewBox','0 0 24 24');s.setAttribute('fill','none');
  s.setAttribute('stroke','currentColor');s.setAttribute('stroke-width','2');
  s.setAttribute('stroke-linecap','round');s.setAttribute('stroke-linejoin','round');
  s.innerHTML=paths;return s;

const IC={

function iBtn(ico,cb,title){

}

// ── secp256k1 / BIP340 Schnorr (Nostr signing) ───────────────────────────────
const K256=(function(){
  const P=BigInt('0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEFFFFFC2F');
  const N=BigInt('0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141');
  const Gx=BigInt('0x79BE667EF9DCBBAC55A06295CE870B07029BFCDB2DCE28D959F2815B16F81798');
  const Gy=BigInt('0x483ADA7726A3C4655DA4FBFC0E1108A8FD17B448A68554199C47D08FFB10D4B8');
  function mod(a,m){m=m||P;const r=a%m;return r<0n?r+m:r;}
  function mpow(b,e,m){let r=1n;b=mod(b,m);while(e>0n){if(e&1n)r=r*b%m;b=b*b%m;e>>=1n;}return r;}
  function inv(a){return mpow(mod(a),P-2n,P);}
  function addPt(p1,p2){
    if(!p1)return p2;if(!p2)return p1;
    if(p1[0]===p2[0]&&p1[1]!==p2[1])return null;
    const x1=p1[0],y1=p1[1],x2=p2[0],y2=p2[1];
    const lam=p1[0]===p2[0]?mod(3n*x1*x1*inv(2n*y1)):mod((y2-y1)*inv(x2-x1));
    const x3=mod(lam*lam-x1-x2),y3=mod(lam*(x1-x3)-y1);
    return[x3,y3];
  }
  function mulPt(k,p){let r=null,q=p;while(k>0n){if(k&1n)r=addPt(r,q);q=addPt(q,q);k>>=1n;}return r;}
  const G=[Gx,Gy];
  function evenY(p){return p[1]%2n===0n;}
  function b32(n){const b=new Uint8Array(32);let v=n;for(let i=31;i>=0;i--){b[i]=Number(v&0xffn);v>>=8n;}return b;}
  function toBig(b){let n=0n;for(let i=0;i<b.length;i++)n=(n<<8n)|BigInt(b[i]);return n;}
  async function tagHash(tag){
    const msgs=Array.prototype.slice.call(arguments,1);
    const tb=new TextEncoder().encode(tag);
    const th=new Uint8Array(await crypto.subtle.digest('SHA-256',tb));
    const pre=new Uint8Array(64);pre.set(th,0);pre.set(th,32);
    let tot=64;for(let i=0;i<msgs.length;i++)tot+=msgs[i].length;
    const buf=new Uint8Array(tot);buf.set(pre,0);let off=64;
    for(let i=0;i<msgs.length;i++){buf.set(msgs[i],off);off+=msgs[i].length;}
    return new Uint8Array(await crypto.subtle.digest('SHA-256',buf));
  }
  function genPriv(){let k;do{k=rnd(32);}while(toBig(k)===0n||toBig(k)>=N);return k;}
  function getPub(priv){const d=toBig(priv),pt=mulPt(d,G);return b32(pt[0]);}
  async function sign(priv,msg){
    const d0=toBig(priv);
    if(d0===0n||d0>=N)throw new Error('bad privkey');
    const Pt=mulPt(d0,G);
    const d=evenY(Pt)?d0:N-d0;
    const Pb=b32(Pt[0]);
    const aux=rnd(32);
    const t=b32(d^toBig(await tagHash('BIP0340/aux',aux)));
    const kb=await tagHash('BIP0340/nonce',t,Pb,msg);
    const k0=mod(toBig(kb),N);
    if(k0===0n)throw new Error('k=0');
    const R=mulPt(k0,G);
    const k=evenY(R)?k0:N-k0;
    const Rb=b32(R[0]);
    const e=mod(toBig(await tagHash('BIP0340/challenge',Rb,Pb,msg)),N);
    const sig=new Uint8Array(64);sig.set(Rb,0);sig.set(b32(mod(k+e*d,N)),32);
    return sig;
  }
  return{genPriv,getPub,sign,toBig,b32};
}());

// ── WebCrypto Engine ─────────────────────────────────────────────────────────
const CE={
  async genECDH(){return crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-256'},true,['deriveKey','deriveBits']);},
  async genECDSA(){return crypto.subtle.generateKey({name:'ECDSA',namedCurve:'P-256'},true,['sign','verify']);},
  async xPub(k){return b64e(await crypto.subtle.exportKey('raw',k));},
  async xPriv(k){return JSON.stringify(await crypto.subtle.exportKey('jwk',k));},
  async iPub(b64,use){use=use||[];return crypto.subtle.importKey('raw',b64d(b64),{name:'ECDH',namedCurve:'P-256'},true,use);},
  async iPriv(j){return crypto.subtle.importKey('jwk',JSON.parse(j),{name:'ECDH',namedCurve:'P-256'},true,['deriveKey','deriveBits']);},
  async iSPub(b64){return crypto.subtle.importKey('raw',b64d(b64),{name:'ECDSA',namedCurve:'P-256'},true,['verify']);},
  async iSPriv(j){return crypto.subtle.importKey('jwk',JSON.parse(j),{name:'ECDSA',namedCurve:'P-256'},true,['sign']);},
  async dh(priv,pub){return new Uint8Array(await crypto.subtle.deriveBits({name:'ECDH',public:pub},priv,256));},
  async hkdf(ikm,salt,info,len){
    len=len||32;
    const k=await crypto.subtle.importKey('raw',ikm,'HKDF',false,['deriveBits']);
    const i=typeof info==='string'?new TextEncoder().encode(info):info;
    const s=salt instanceof Uint8Array?salt:new Uint8Array(32);
    return new Uint8Array(await crypto.subtle.deriveBits({name:'HKDF',hash:'SHA-256',salt:s,info:i},k,len*8));
  },
  async pbkdf2(pass,salt,iter){
    iter=iter||V.pbkdfIter;
    const k=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveBits']);
    const s=salt instanceof Uint8Array?salt:new TextEncoder().encode(salt);
    return new Uint8Array(await crypto.subtle.deriveBits({name:'PBKDF2',hash:'SHA-256',salt:s,iterations:iter},k,256));
  },
  async aenc(key,pt,aad){
    const k=await crypto.subtle.importKey('raw',key,'AES-GCM',false,['encrypt']);
    const iv=rnd(12);const p={name:'AES-GCM',iv:iv,tagLength:128};

    const data=typeof pt==='string'?new TextEncoder().encode(pt):pt;
    const ct=await crypto.subtle.encrypt(p,k,data);
    const out=new Uint8Array(12+ct.byteLength);out.set(iv,0);out.set(new Uint8Array(ct),12);

  },
  async adec(key,data,aad){
    const k=await crypto.subtle.importKey('raw',key,'AES-GCM',false,['decrypt']);
    const p={name:'AES-GCM',iv:data.slice(0,12),tagLength:128};
    if(aad)p.additionalData=aad;
    return new Uint8Array(await crypto.subtle.decrypt(p,k,data.slice(12)));
  },
  async hmac(key,data){
    const k=await crypto.subtle.importKey('raw',key,{name:'HMAC',hash:'SHA-256'},false,['sign']);
    return new Uint8Array(await crypto.subtle.sign('HMAC',k,data));
  },
  async signECDSA(priv,data){
    const d=typeof data==='string'?new TextEncoder().encode(data):data;
    return b64e(await crypto.subtle.sign({name:'ECDSA',hash:'SHA-256'},priv,d));
  },
  async verifyECDSA(pub,sig,data){
    try{
      const d=typeof data==='string'?new TextEncoder().encode(data):data;
      return await crypto.subtle.verify({name:'ECDSA',hash:'SHA-256'},pub,b64d(sig),d);
    }catch(e){return false;}
  },
  async sha256(data){
    const d=typeof data==='string'?new TextEncoder().encode(data):data;
    return new Uint8Array(await crypto.subtle.digest('SHA-256',d));
  },
  cat:function(){
    let total=0;
    for(let i=0;i<arguments.length;i++)total+=arguments[i].length;
    const out=new Uint8Array(total);let off=0;
    for(let i=0;i<arguments.length;i++){out.set(arguments[i],off);off+=arguments[i].length;}
    return out;
  },
  wipe:function(){for(let i=0;i<arguments.length;i++)if(arguments[i]instanceof Uint8Array)arguments[i].fill(0);},
};

// ── X3DH ─────────────────────────────────────────────────────────────────────
const X3DH={
  async genBundle(){
    const ik=await CE.genECDH(),spk=await CE.genECDH(),sigkp=await CE.genECDSA();
    const opks=[];
    for(let i=0;i<15;i++){const k=await CE.genECDH();opks.push({pub:await CE.xPub(k.publicKey),priv:await CE.xPriv(k.privateKey)});}
    const spkPub=await CE.xPub(spk.publicKey);
    const spkSig=await CE.signECDSA(sigkp.privateKey,spkPub);
    return{
      pub:{ikPub:await CE.xPub(ik.publicKey),spkPub:spkPub,spkSig:spkSig,sigPub:await CE.xPub(sigkp.publicKey),opkPubs:opks.map(function(o){return o.pub;})},
      priv:{ikPriv:await CE.xPriv(ik.privateKey),spkPriv:await CE.xPriv(spk.privateKey),sigPriv:await CE.xPriv(sigkp.privateKey),opkPrivs:opks.map(function(o){return o.priv;})},
    };
  },
  async send(aliceIkPrivJwk,bobPub){
    const aIk=await CE.iPriv(aliceIkPrivJwk);
    const bIkP=await CE.iPub(bobPub.ikPub);
    const bSpkP=await CE.iPub(bobPub.spkPub);
    const bSigP=await CE.iSPub(bobPub.sigPub);
    if(!await CE.verifyECDSA(bSigP,bobPub.spkSig,bobPub.spkPub))throw new Error('SPK signature invalid — possible MITM');
    const ekKP=await CE.genECDH();const ekPub=await CE.xPub(ekKP.publicKey);
    const F=new Uint8Array(32).fill(0xFF);
    const d1=await CE.dh(aIk,bSpkP),d2=await CE.dh(ekKP.privateKey,bIkP),d3=await CE.dh(ekKP.privateKey,bSpkP);
    let ikm=CE.cat(F,d1,d2,d3);let opkIdx=null;
    if(bobPub.opkPubs&&bobPub.opkPubs.length){
      opkIdx=0;const opkP=await CE.iPub(bobPub.opkPubs[0]);
      const d4=await CE.dh(ekKP.privateKey,opkP);ikm=CE.cat(ikm,d4);
    }
    const sk=await CE.hkdf(ikm,new Uint8Array(32),'VOID_X3DH_v3',32);
    CE.wipe(d1,d2,d3,ikm);
    return{sharedKey:sk,ekPub:ekPub,opkIdx:opkIdx};
  },
  async recv(bobPriv,aIkPub,aEkPub,opkIdx){
    const bIk=await CE.iPriv(bobPriv.ikPriv),bSpk=await CE.iPriv(bobPriv.spkPriv);
    const aIk=await CE.iPub(aIkPub),aEk=await CE.iPub(aEkPub);
    const F=new Uint8Array(32).fill(0xFF);
    const d1=await CE.dh(bSpk,aIk),d2=await CE.dh(bIk,aEk),d3=await CE.dh(bSpk,aEk);
    let ikm=CE.cat(F,d1,d2,d3);
    if(opkIdx!=null&&bobPriv.opkPrivs&&bobPriv.opkPrivs[opkIdx]){
      const op=await CE.iPriv(bobPriv.opkPrivs[opkIdx]);
      const d4=await CE.dh(op,aEk);ikm=CE.cat(ikm,d4);
    }
    const sk=await CE.hkdf(ikm,new Uint8Array(32),'VOID_X3DH_v3',32);
    CE.wipe(d1,d2,d3,ikm);return{sharedKey:sk};
  },
};

// ── Double Ratchet ────────────────────────────────────────────────────────────
const MXSK=200,RKINFO='VOID_RK_v3';
const CC=new Uint8Array([2]),MC=new Uint8Array([1]);
async function kdfRK(rk,dh){const d=await CE.hkdf(dh,rk,RKINFO,64);return{rk:d.slice(0,32),ck:d.slice(32)};}
async function kdfCK(ck){return{mk:await CE.hmac(ck,MC),nc:await CE.hmac(ck,CC)};}

function Ratchet(){
  this.dsp=null;this.dpub=null;this.drp=null;this.rk=null;
  this.cks=null;this.ckr=null;this.ns=0;this.nr=0;this.pn=0;this.sk={};
}
Ratchet.prototype.initS=async function(sk,rp){
  const kp=await CE.genECDH();
  this.dsp=await CE.xPriv(kp.privateKey);this.dpub=await CE.xPub(kp.publicKey);this.drp=rp;
  const rpk=await CE.iPub(rp),sp=await CE.iPriv(this.dsp),dh=await CE.dh(sp,rpk);
  const res=await kdfRK(sk,dh);this.rk=res.rk;this.cks=res.ck;CE.wipe(dh);
};
Ratchet.prototype.initR=async function(sk,privJwk,pubB64){
  this.dsp=privJwk;this.dpub=pubB64;this.rk=sk;
};
Ratchet.prototype.enc=async function(pt){
  if(!this.cks)throw new Error('No send chain');
  const res=await kdfCK(this.cks);this.cks=res.nc;
  const hdr={dh:this.dpub,pn:this.pn,n:this.ns++};
  const hb=new TextEncoder().encode(JSON.stringify(hdr));
  const data=typeof pt==='string'?new TextEncoder().encode(pt):pt;
  const ct=await CE.aenc(res.mk,data,hb);
  CE.wipe(res.mk);return{hdr:hdr,ct:b64e(ct)};
};
Ratchet.prototype.dec=async function(msg){
  const hdr=msg.hdr,ct=msg.ct,sk=hdr.dh+':'+hdr.n;
  if(this.sk[sk]){const mk=b64d(this.sk[sk]);delete this.sk[sk];return this._dw(mk,hdr,ct);}
  if(hdr.dh!==this.drp){await this._skip(hdr.pn);await this._step(hdr.dh);}
  await this._skip(hdr.n);
  const res=await kdfCK(this.ckr);this.ckr=res.nc;this.nr++;
  const pt=await this._dw(res.mk,hdr,ct);CE.wipe(res.mk);return pt;
};
Ratchet.prototype._dw=async function(mk,hdr,ctB64){
  const hb=new TextEncoder().encode(JSON.stringify(hdr));
  const plain=await CE.adec(mk,b64d(ctB64),hb);
  return new TextDecoder().decode(plain);
};
Ratchet.prototype._skip=async function(until){
  if(!this.ckr)return;
  if(until>this.nr+MXSK)throw new Error('Too many skipped');
  let ck=this.ckr;
  while(this.nr<until){
    const res=await kdfCK(ck);
    this.sk[this.drp+':'+this.nr]=b64e(res.mk);ck=res.nc;this.nr++;
  }
  this.ckr=ck;
};
Ratchet.prototype._step=async function(rp){
  this.pn=this.ns;this.ns=0;this.nr=0;this.drp=rp;
  const rPub=await CE.iPub(rp),sp=await CE.iPriv(this.dsp),dh1=await CE.dh(sp,rPub);
  const r1=await kdfRK(this.rk,dh1);
  const kp=await CE.genECDH();
  this.dsp=await CE.xPriv(kp.privateKey);this.dpub=await CE.xPub(kp.publicKey);
  const np=await CE.iPriv(this.dsp),dh2=await CE.dh(np,rPub);
  const r2=await kdfRK(r1.rk,dh2);
  this.rk=r2.rk;this.ckr=r1.ck;this.cks=r2.ck;CE.wipe(dh1,dh2);
};
Ratchet.prototype.ser=function(){
  return{dsp:this.dsp,dpub:this.dpub,drp:this.drp,
    rk:this.rk?b64e(this.rk):null,cks:this.cks?b64e(this.cks):null,ckr:this.ckr?b64e(this.ckr):null,
    ns:this.ns,nr:this.nr,pn:this.pn,sk:this.sk};
};
Ratchet.de=function(d){
  const r=new Ratchet();
  r.dsp=d.dsp;r.dpub=d.dpub;r.drp=d.drp;
  r.rk=d.rk?b64d(d.rk):null;r.cks=d.cks?b64d(d.cks):null;r.ckr=d.ckr?b64d(d.ckr):null;
  r.ns=d.ns;r.nr=d.nr;r.pn=d.pn;r.sk=d.sk||{};return r;
};

// ── Key Transparency Log (append-only Merkle chain) ───────────────────────────
const KTL={
  _e:[],
  async append(userId,keyB64){
    const kh=hexe(await CE.sha256(keyB64));
    const ph=this._e.length?this._e[this._e.length-1].eh:'0'.repeat(64);
    const payload=JSON.stringify({i:this._e.length,u:userId,k:kh,t:now(),p:ph});
    const eh=hexe(await CE.sha256(payload));
    const entry={i:this._e.length,u:userId,k:kh,t:now(),p:ph,eh:eh};
    this._e.push(entry);await DB.set('ktlog',this._e);return entry;
  },
  async verify(){
    for(let i=1;i<this._e.length;i++)if(this._e[i].p!==this._e[i-1].eh)return false;
    return true;
  },
  async load(){const e=await DB.get('ktlog');if(e)this._e=e;},
  entries(){return this._e.slice();}
};

// ── Steganography (LSB in PNG via Canvas) ─────────────────────────────────────
const Steg={
  async encode(file,msg){
    const img=await loadImg(file);
    const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;
    const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
    const d=ctx.getImageData(0,0,c.width,c.height);
    const bytes=new TextEncoder().encode(msg);
    const lb=new Uint8Array(4);new DataView(lb.buffer).setUint32(0,bytes.length,false);
    const pay=new Uint8Array(4+bytes.length);pay.set(lb);pay.set(bytes,4);
    const maxBytes=Math.floor((d.data.length/4)*3/8);
    if(pay.length>maxBytes)throw new Error('Image too small for this message — use a larger image');
    let bi=0;
    for(let i=0;i<pay.length;i++){
      for(let b=7;b>=0;b--){
        const pb=Math.floor(bi/3)*4+(bi%3);
        d.data[pb]=(d.data[pb]&0xFE)|((pay[i]>>b)&1);bi++;
      }
    }
    ctx.putImageData(d,0,0);
    return new Promise(function(res){c.toBlob(function(blob){res(blob);},'image/png');});
  },
  async decode(file){
    const img=await loadImg(file);
    const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;
    const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
    const data=ctx.getImageData(0,0,c.width,c.height).data;
    let len=0;
    for(let b=0;b<32;b++){const pb=Math.floor(b/3)*4+(b%3);len=(len<<1)|(data[pb]&1);}
    if(len<=0||len>500000)throw new Error('No hidden message found in this image');
    const mb=new Uint8Array(len);
    for(let i=0;i<len;i++){
      let byte=0;
      for(let b=7;b>=0;b--){
        const g=32+i*8+(7-b);const pb=Math.floor(g/3)*4+(g%3);
        byte=(byte<<1)|(data[pb]&1);
      }
      mb[i]=byte;
    }
    return new TextDecoder().decode(mb);
  }
};
function loadImg(file){
  return new Promise(function(res,rej){
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=function(){URL.revokeObjectURL(url);res(img);};
    img.onerror=rej;img.src=url;
  });
}

// ── QR Code (pure JS, no library) ─────────────────────────────────────────────
const QR=(function(){
  const GF={exp:new Uint8Array(512),log:new Uint8Array(256)};
  let x=1;
  for(let i=0;i<255;i++){GF.exp[i]=x;GF.log[x]=i;x=x<128?x*2:(x*2)^285;}
  for(let i=255;i<512;i++)GF.exp[i]=GF.exp[i-255];
  function gm(a,b){return a&&b?GF.exp[GF.log[a]+GF.log[b]]:0;}
  function rs(data,n){
    const g=[1];
    for(let i=0;i<n;i++){
      const nx=[1];
      for(let j=0;j<g.length;j++){nx.push(gm(g[j],GF.exp[i]));if(j+1<g.length)nx[nx.length-1]^=gm(g[j+1],GF.exp[i]);}
      g.length=0;for(let j=0;j<nx.length;j++)g.push(nx[j]);
    }
    const r=data.slice();for(let i=0;i<n;i++)r.push(0);
    for(let i=0;i<data.length;i++){const cv=r[i];if(cv)for(let j=0;j<g.length;j++)r[i+j]^=gm(cv,g[j]);}
    return r.slice(data.length);
  }
  const SZ=29;
  function mat(){
    const m=[];for(let i=0;i<SZ;i++){m.push([]);for(let j=0;j<SZ;j++)m[i].push(-1);}
    function fp(r,c){
      for(let dr=-1;dr<=7;dr++)for(let dc=-1;dc<=7;dc++){
        const nr=r+dr,nc=c+dc;if(nr<0||nr>=SZ||nc<0||nc>=SZ)continue;
        const is=dr>=0&&dr<=6&&dc>=0&&dc<=6;
        m[nr][nc]=is?((dr===0||dr===6||dc===0||dc===6)||(dr>=2&&dr<=4&&dc>=2&&dc<=4)?1:0):0;
      }
    }
    fp(0,0);fp(0,SZ-7);fp(SZ-7,0);
    for(let i=8;i<SZ-8;i++){m[6][i]=i%2===0?1:0;m[i][6]=i%2===0?1:0;}
    for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){
      const r=22+dr,c=22+dc;
      if(m[r][c]===-1)m[r][c]=(dr===0&&dc===0)||Math.abs(dr)===2||Math.abs(dc)===2?1:0;
    }
    m[8][SZ-8]=1;return m;
  }
  function place(m,bits){
    let idx=0,up=true;
    for(let col=SZ-1;col>=1;col-=2){
      if(col===6)col--;
      for(let row=0;row<SZ;row++){
        const r=up?SZ-1-row:row;
        for(let dc=0;dc<2;dc++){const c=col-dc;if(m[r][c]===-1)m[r][c]=idx<bits.length?bits[idx++]:0;}
      }
      up=!up;
    }
  }
  function applyMask(m){
    const nm=[];for(let i=0;i<SZ;i++){nm.push([]);for(let j=0;j<SZ;j++)nm[i].push(m[i][j]);}
    for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++)if(nm[r][c]!==-1&&nm[r][c]<2&&(r+c)%2===0)nm[r][c]^=1;
    return nm;
  }
  function fmt(m){
    const f=0b101010000010010^((1<<3)|0);
    const ps=[[8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[8,7],[8,8],[7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8]];
    for(let i=0;i<15;i++)m[ps[i][0]][ps[i][1]]=(f>>i)&1;
    const ps2=[[SZ-1,8],[SZ-2,8],[SZ-3,8],[SZ-4,8],[SZ-5,8],[SZ-6,8],[SZ-7,8],[8,SZ-8],[8,SZ-7],[8,SZ-6],[8,SZ-5],[8,SZ-4],[8,SZ-3],[8,SZ-2],[8,SZ-1]];
    for(let i=0;i<15;i++)m[ps2[i][0]][ps2[i][1]]=(f>>i)&1;
  }
  function encode(text){
    const data=new TextEncoder().encode(text.slice(0,34));
    const bits=[],ab=function(v,n){for(let i=n-1;i>=0;i--)bits.push((v>>i)&1);};
    ab(4,4);ab(data.length,8);for(let i=0;i<data.length;i++)ab(data[i],8);
    ab(0,4);while(bits.length%8)bits.push(0);
    const cw=[];
    for(let i=0;i<bits.length;i+=8){let b=0;for(let j=0;j<8;j++)b=(b<<1)|bits[i+j];cw.push(b);}
    const pads=[0xEC,0x11];while(cw.length<28)cw.push(pads[(cw.length-1)%2===0?0:1]);
    const ec=rs(cw,22);const all=cw.concat(ec);const ab2=[];
    for(let i=0;i<all.length;i++)for(let j=7;j>=0;j--)ab2.push((all[i]>>j)&1);
    return ab2;
  }
  return{draw:function(text,scale){
    scale=scale||4;
    const m=mat();place(m,encode(text));fmt(m);const mk=applyMask(m);
    const c=document.createElement('canvas');const q=4;
    c.width=(SZ+q*2)*scale;c.height=c.width;
    const ctx=c.getContext('2d');
    ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle='#000';
    for(let r=0;r<SZ;r++)for(let col=0;col<SZ;col++)
      if(mk[r][col]===1)ctx.fillRect((col+q)*scale,(r+q)*scale,scale,scale);
    return c;
  }};
}());

// ── IndexedDB ─────────────────────────────────────────────────────────────────
const DB=(function(){
  let _db=null;
  async function open(){
    if(_db)return _db;
    return new Promise(function(res,rej){
      const q=indexedDB.open(V.dbName,V.dbVer);
      q.onupgradeneeded=function(e){
        const db=e.target.result;
        if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv');
        if(!db.objectStoreNames.contains('msgs')){
          const ms=db.createObjectStore('msgs',{keyPath:'id'});
          ms.createIndex('ci','convId');
        }
      };
      q.onsuccess=function(e){_db=e.target.result;res(_db);};
      q.onerror=function(e){rej(e.target.error);};
    });
  }
  async function tx(stores,mode,fn){
    const db=await open();
    return new Promise(function(res,rej){
      const t=db.transaction(stores,mode);
      t.onerror=function(e){rej(e.target.error);};
      fn(t,res,rej);
    });
  }
  return{
    async get(k){return tx('kv','readonly',function(t,res){const q=t.objectStore('kv').get(k);q.onsuccess=function(){res(q.result!=null?q.result:null);};});},
    async set(k,v){return tx('kv','readwrite',function(t,res){t.objectStore('kv').put(v,k);t.oncomplete=res;});},
    async del(k){return tx('kv','readwrite',function(t,res){t.objectStore('kv').delete(k);t.oncomplete=res;});},
    async putMsg(m){return tx('msgs','readwrite',function(t,res){t.objectStore('msgs').put(m);t.oncomplete=res;});},
    async getMsgs(cid){return tx('msgs','readonly',function(t,res){const q=t.objectStore('msgs').index('ci').getAll(cid);q.onsuccess=function(){res(q.result.sort(function(a,b){return a.ts-b.ts;}));};});},
    async getAllMsgs(){return tx('msgs','readonly',function(t,res){const q=t.objectStore('msgs').getAll();q.onsuccess=function(){res(q.result);};});},
    async delMsg(id){return tx('msgs','readwrite',function(t,res){t.objectStore('msgs').delete(id);t.oncomplete=res;});},
    async nuke(){return tx(['kv','msgs'],'readwrite',function(t,res){['kv','msgs'].forEach(function(s){t.objectStore(s).clear();});t.oncomplete=res;});},
    async purge(){
      const all=await this.getAllMsgs();const n=now();
      for(let i=0;i<all.length;i++)if(all[i].burnAt&&all[i].burnAt<n)await this.delMsg(all[i].id);
    }
  };
}());

// ── Nostr (multi-relay onion encryption) ─────────────────────────────────────
// Each relay gets: different ciphertext, different topic hash, different ephemeral key.
// No relay can link messages across relays. Timestamps jittered ±8s.
const Nostr={
  _ws:{},_ok:new Set(),_subs:{},_privKey:null,_pubKey:null,
  async init(){this._privKey=K256.genPriv();this._pubKey=K256.getPub(this._privKey);},
  async connect(){
    if(!this._privKey)await this.init();
    for(let i=0;i<V.nostrRelays.length;i++){
      const url=V.nostrRelays[i];
      if(this._ws[url])continue;
      const self=this;
      try{
        const ws=new WebSocket(url);
        ws.onopen=function(){
          self._ok.add(url);self._resubAll(url);App.re();
          if(App.s.identity)setTimeout(function(){publishSelf().catch(function(){});},500);
        };
        ws.onmessage=function(e){self._onMsg(url,e.data);};
        ws.onclose=function(){self._ok.delete(url);delete self._ws[url];setTimeout(function(){self._tryConnect(url);},12000);};
        ws.onerror=function(){};
        this._ws[url]=ws;
      }catch(e){}
    }
  },
  _tryConnect(url){
    const self=this;
    try{
      const ws=new WebSocket(url);
      ws.onopen=function(){
        self._ok.add(url);
        self._resubAll(url);
        App.re();
        // Re-publish our bundle to this relay as soon as it connects
        // so our bundle is always fresh on every relay we join
        if(App.s.identity)setTimeout(function(){publishSelf().catch(function(){});},500);
      };
      ws.onmessage=function(e){self._onMsg(url,e.data);};
      ws.onclose=function(){self._ok.delete(url);delete self._ws[url];setTimeout(function(){self._tryConnect(url);},12000);};
      ws.onerror=function(){};
      self._ws[url]=ws;
    }catch(e){}
  },
  _resubAll(url){
    const ws=this._ws[url];if(!ws||ws.readyState!==1)return;
    // Re-send all active subscriptions to the newly connected relay
    for(const id in this._subs){
      try{ws.send(JSON.stringify(['REQ',id,{kinds:[30078],'#d':[this._subs[id].topic],limit:100}]));}catch(e){}
    }
  },
  async subscribe(convId,topicKey,aesKey,cb){
    // Subscribe to all hop topics + base topic
    const numHops=V.nostrRelays.length;
    for(let h=0;h<numHops;h++){
      const hopKey=await CE.hkdf(aesKey,new Uint8Array([h]),'VOID_HOP_DEC_'+h,32);
      const hopTopicIn=CE.cat(await CE.sha256(topicKey),new Uint8Array([h]));
      const hopTopic=hexe(await CE.hmac(hopTopicIn,new TextEncoder().encode('VOID_HOP_TOPIC')));
      const subId='v_'+convId.slice(0,12)+'_h'+h;
      this._subs[subId]={topic:hopTopic,key:hopKey,cb:cb};
      for(const url in this._ws){
        const ws=this._ws[url];
        if(ws.readyState===1)ws.send(JSON.stringify(['REQ',subId,{kinds:[30078],'#d':[hopTopic],limit:100}]));
      }
    }
    const baseTopic=hexe(await CE.hmac(topicKey,new TextEncoder().encode('VOID_TOPIC_v3')));
    const baseId='v_'+convId.slice(0,12)+'_base';
    this._subs[baseId]={topic:baseTopic,key:aesKey,cb:cb};
    for(const url in this._ws){
      const ws=this._ws[url];
      if(ws.readyState===1)ws.send(JSON.stringify(['REQ',baseId,{kinds:[30078],'#d':[baseTopic],limit:100}]));
    }
  },
  async _onMsg(url,raw){
    try{
      const data=JSON.parse(raw);
      if(data[0]!=='EVENT')return;
      const evt=data[2];
      for(const id in this._subs){
        const sub=this._subs[id];
        const dTag=evt.tags&&evt.tags.filter(function(t){return t[0]==='d';})[0];
        if(!dTag||dTag[1]!==sub.topic)continue;
        try{
          const ct=b64d(evt.content);
          const pt=await CE.adec(sub.key,ct);
          const msg=JSON.parse(new TextDecoder().decode(pt));
          await sub.cb(msg);
        }catch(e){}
      }
    }catch(e){}
  },
  // ── publishDirect: send same event to ALL relays simultaneously ─────────────
  // Used for bundle discovery. Topic is stable and predictable from userId alone.
  // Nostr kind 30078 is a "parameterized replaceable event" — relays keep the
  // LATEST event per (pubkey, kind, d-tag). So your bundle persists on every
  // relay and is findable even when you're offline.
  async publishDirect(topicHash,aesKey,msgObj){
    if(!this._privKey)await this.init();
    const ct=await CE.aenc(aesKey,new TextEncoder().encode(JSON.stringify(msgObj)));
    const pubHex=hexe(this._pubKey);
    const created=Math.floor(now()/1000);
    const tags=[['d',topicHash]];
    const content=b64e(ct);
    const idStr=JSON.stringify([0,pubHex,created,30078,tags,content]);
    const idBytes=await CE.sha256(idStr);
    const idHex=hexe(idBytes);
    let sigHex='0'.repeat(128);
    try{sigHex=hexe(await K256.sign(this._privKey,idBytes));}catch(e){}
    const evt={id:idHex,pubkey:pubHex,created_at:created,kind:30078,tags:tags,content:content,sig:sigHex};
    const msg=JSON.stringify(['EVENT',evt]);
    // Send to ALL relays — we want maximum persistence
    let sent=0;
    for(const url in this._ws){
      const ws=this._ws[url];
      if(ws.readyState===1){try{ws.send(msg);sent++;}catch(e){}}
    }
    return sent;
  },

  // ── publish: multi-relay onion for MESSAGES (not discovery) ─────────────────
  // Each relay gets a different ciphertext + different topic = cannot correlate
  async publish(topicKey,aesKey,msgObj){
    if(!this._privKey)await this.init();
    const payload=JSON.stringify(msgObj);
    const relayEntries=Object.entries(this._ws).filter(function(e){return e[1].readyState===1;});
    const numHops=Math.max(1,relayEntries.length);
    for(let h=0;h<numHops;h++){
      const hopKey=await CE.hkdf(aesKey,new Uint8Array([h]),'VOID_HOP_DEC_'+h,32);
      const hopTopicIn=CE.cat(await CE.sha256(topicKey),new Uint8Array([h]));
      const hopTopic=hexe(await CE.hmac(hopTopicIn,new TextEncoder().encode('VOID_HOP_TOPIC')));
      const hopCt=await CE.aenc(hopKey,new TextEncoder().encode(payload));
      const pubHex=hexe(this._pubKey);
      const created=Math.floor((now()+ri(-8000,8000))/1000);
      const tags=[['d',hopTopic]];
      const content=b64e(hopCt);
      const idStr=JSON.stringify([0,pubHex,created,30078,tags,content]);
      const idBytes=await CE.sha256(idStr);
      const idHex=hexe(idBytes);
      let sigHex='0'.repeat(128);
      try{sigHex=hexe(await K256.sign(this._privKey,idBytes));}catch(e){}
      const evt={id:idHex,pubkey:pubHex,created_at:created,kind:30078,tags:tags,content:content,sig:sigHex};
      const msg=JSON.stringify(['EVENT',evt]);
      const delay=ri(V.minDelay*(h+1),V.maxDelay*(h+1));
      if(relayEntries[h]){
        const ws=relayEntries[h][1];
        setTimeout(function(w,m){try{w.send(m);}catch(e){}},delay,ws,msg);
      }else{
        setTimeout(function(m){
          for(const url in Nostr._ws){const w=Nostr._ws[url];if(w.readyState===1)try{w.send(m);}catch(e){}}
        },delay,msg);
      }
    }
  },
  get connectedCount(){return this._ok.size;},
  disconnect(){
    for(const url in this._ws)try{this._ws[url].close();}catch(e){}
    this._ws={};this._ok.clear();
  }
};

// ── WebRTC P2P ────────────────────────────────────────────────────────────────
const P2P={
  _pcs:{},_dcs:{},
  onMsg:null,onState:null,
  async offer(convId){
    const pc=new RTCPeerConnection({iceServers:V.iceServers,iceCandidatePoolSize:5});
    this._pcs[convId]=pc;
    const dc=pc.createDataChannel('void',{ordered:true});
    this._dcs[convId]=dc;this._wire(dc,convId);
    const self=this;
    pc.onconnectionstatechange=function(){if(self.onState)self.onState(convId,pc.connectionState);};
    const o=await pc.createOffer();await pc.setLocalDescription(o);
    await new Promise(function(res){
      if(pc.iceGatheringState==='complete')return res();
      pc.onicegatheringstatechange=function(){if(pc.iceGatheringState==='complete')res();};
      setTimeout(res,6000);
    });
    return JSON.stringify(pc.localDescription);
  },
  async answer(convId,offerStr){
    const pc=new RTCPeerConnection({iceServers:V.iceServers,iceCandidatePoolSize:5});
    this._pcs[convId]=pc;
    const self=this;
    pc.ondatachannel=function(e){self._dcs[convId]=e.channel;self._wire(e.channel,convId);};
    pc.onconnectionstatechange=function(){if(self.onState)self.onState(convId,pc.connectionState);};
    await pc.setRemoteDescription(JSON.parse(offerStr));
    const a=await pc.createAnswer();await pc.setLocalDescription(a);
    await new Promise(function(res){
      if(pc.iceGatheringState==='complete')return res();
      pc.onicegatheringstatechange=function(){if(pc.iceGatheringState==='complete')res();};
      setTimeout(res,6000);
    });
    return JSON.stringify(pc.localDescription);
  },
  async applyAnswer(convId,ansStr){
    const pc=this._pcs[convId];
    if(!pc)throw new Error('No pending offer — generate an offer first');
    await pc.setRemoteDescription(JSON.parse(ansStr));
  },
  _wire(dc,convId){
    const self=this;
    dc.onopen=function(){if(self.onState)self.onState(convId,'connected');};
    dc.onclose=function(){if(self.onState)self.onState(convId,'disconnected');};
    dc.onerror=function(){if(self.onState)self.onState(convId,'error');};
    dc.onmessage=function(e){try{const d=JSON.parse(e.data);if(self.onMsg)self.onMsg(convId,d);}catch(e){}};
  },
  send(convId,obj){
    const dc=this._dcs[convId];
    if(dc&&dc.readyState==='open'){dc.send(JSON.stringify(obj));return true;}
    return false;
  },
  state(convId){return(this._dcs[convId]&&this._dcs[convId].readyState)||'none';},
  close(convId){
    try{if(this._dcs[convId])this._dcs[convId].close();}catch(e){}
    try{if(this._pcs[convId])this._pcs[convId].close();}catch(e){}
    delete this._dcs[convId];delete this._pcs[convId];
  }
};

// ── App State ─────────────────────────────────────────────────────────────────
const App={
  s:{
    page:'loading',identity:null,sessionKey:null,
    contacts:[],conversations:[],ratchets:{},
    topicKeys:{},nostrKeys:{},
    activeConvId:null,p2pStates:{},unread:{},
    defaultTtl:86400,ramOnly:false,wipeHide:false,wipeClose:false,wipeDevTools:true,
  },
  re:function(){
    const app=document.getElementById('app');if(!app)return;
    const pg=Pages[App.s.page]||Pages.loading;
    try{
      const newEl=pg();
      if(app.firstChild)app.replaceChild(newEl,app.firstChild);
      else app.appendChild(newEl);
    }catch(e){console.error('Render error:',e);}
  }
};

function setState(updates){
  for(const k in updates)App.s[k]=updates[k];
  App.re();
  if(updates.page==='conversations'&&App.s.identity){
    publishSelf().catch(function(){});
    if(Nostr.connectedCount===0)Nostr.connect().catch(function(){});
  }
}

async function persist(){
  if(App.s.ramOnly||!App.s.sessionKey)return;
  const id=App.s.identity,key=App.s.sessionKey;
  if(id){
    const ct=await CE.aenc(key,new TextEncoder().encode(JSON.stringify(id)));
    await DB.set('id',b64e(ct));
  }
  await DB.set('contacts',App.s.contacts);
  await DB.set('convs',App.s.conversations);
  await DB.set('settings',{defaultTtl:App.s.defaultTtl,ramOnly:App.s.ramOnly,wipeHide:App.s.wipeHide,wipeClose:App.s.wipeClose,wipeDevTools:App.s.wipeDevTools});
  for(const cid in App.s.ratchets)await DB.set('r:'+cid,App.s.ratchets[cid].ser());
  const tk={};for(const k in App.s.topicKeys)tk[k]=b64e(App.s.topicKeys[k]);await DB.set('tk',tk);
  const nk={};for(const k in App.s.nostrKeys)nk[k]=b64e(App.s.nostrKeys[k]);await DB.set('nk',nk);
}

// ── Panic ─────────────────────────────────────────────────────────────────────
const Panic={
  _t:null,_dv:false,
  init:function(){
    const self=this;
    window.addEventListener('beforeunload',function(){if(App.s.wipeClose)self.wipe('close');});
    document.addEventListener('visibilitychange',function(){if(document.hidden&&App.s.wipeHide)self.wipe('hide');});
    ['mousemove','keydown','touchstart','click'].forEach(function(ev){
      document.addEventListener(ev,function(){self._rst();},{passive:true});
    });
    this._rst();
    setInterval(function(){
      const w=window.outerWidth-window.innerWidth,h=window.outerHeight-window.innerHeight;
      const open=w>160||h>160;
      if(open&&!self._dv){self._dv=true;if(App.s.wipeDevTools)self.wipe('devtools');}
      if(!open)self._dv=false;
    },1200);
  },
  _rst:function(){
    clearTimeout(this._t);if(!App.s.identity)return;
    const self=this;
    this._t=setTimeout(function(){self.wipe('inactivity');},V.inactMs);
  },
  async wipe(reason){
    Nostr.disconnect();
    for(const cid in App.s.ratchets)P2P.close(cid);
    App.s.identity=null;App.s.sessionKey=null;App.s.ratchets={};App.s.topicKeys={};App.s.nostrKeys={};
    try{await DB.nuke();}catch(e){}
    try{localStorage.clear();sessionStorage.clear();}catch(e){}
    document.getElementById('ws').classList.add('show');
    document.getElementById('app').innerHTML='';
  },
  hold:function(el){
    let t;
    el.addEventListener('pointerdown',function(){t=setTimeout(function(){Panic.wipe('hold');},3000);});
    ['pointerup','pointerleave','touchend'].forEach(function(ev){el.addEventListener(ev,function(){clearTimeout(t);});});
  }
};

// ── Actions ───────────────────────────────────────────────────────────────────
const Act={
  async createIdentity(){
    const bundle=await X3DH.genBundle();
    const userId=hexe(rnd(32));
    App.s.identity={userId:userId,pub:bundle.pub,priv:bundle.priv,createdAt:now()};
    await KTL.load();await KTL.append(userId,bundle.pub.ikPub);
    setState({page:'setPass'});
  },
  async savePass(pass,decoyPass){
    const salt=rnd(32),key=await CE.pbkdf2(pass,salt);
    await DB.set('salt',b64e(salt));
    App.s.sessionKey=key;
    const ct=await CE.aenc(key,new TextEncoder().encode(JSON.stringify(App.s.identity)));
    await DB.set('id',b64e(ct));
    await DB.set('contacts',[]);await DB.set('convs',[]);
    await DB.set('settings',{defaultTtl:86400,ramOnly:false,wipeHide:false,wipeClose:false,wipeDevTools:true});
    if(decoyPass&&decoyPass.length>=4){
      const ds=rnd(32),dk=await CE.pbkdf2(decoyPass,ds);
      const di={userId:hexe(rnd(16)),pub:{},priv:{},isDecoy:true};
      const dct=await CE.aenc(dk,new TextEncoder().encode(JSON.stringify(di)));
      await DB.set('dSalt',b64e(ds));await DB.set('dId',b64e(dct));
    }
    await Nostr.connect();
    App.s.contacts=[];App.s.conversations=[];
    setState({page:'conversations'});
  },
  async unlock(pass){
    const saltB64=await DB.get('salt');if(!saltB64)throw new Error('No saved identity');
    const key=await CE.pbkdf2(pass,b64d(saltB64));
    let identity=null;
    try{const ct=await DB.get('id');if(ct){const pt=await CE.adec(key,b64d(ct));identity=JSON.parse(new TextDecoder().decode(pt));}}catch(e){}
    if(!identity){
      const ds=await DB.get('dSalt');
      if(ds){
        const dk=await CE.pbkdf2(pass,b64d(ds));
        try{const dct=await DB.get('dId');if(dct){const pt=await CE.adec(dk,b64d(dct));identity=JSON.parse(new TextDecoder().decode(pt));}}catch(e){}
        if(identity){App.s.sessionKey=dk;App.s.identity=identity;await Nostr.connect();setState({page:'conversations',contacts:[],conversations:[]});return;}
      }
      throw new Error('Wrong passphrase');
    }
    App.s.sessionKey=key;App.s.identity=identity;
    const contacts=await DB.get('contacts');const convs=await DB.get('convs');const settings=await DB.get('settings');
    App.s.contacts=contacts||[];App.s.conversations=convs||[];
    if(settings)for(const k in settings)App.s[k]=settings[k];
    for(let i=0;i<App.s.conversations.length;i++){
      const conv=App.s.conversations[i];
      const rd=await DB.get('r:'+conv.id);if(rd)App.s.ratchets[conv.id]=Ratchet.de(rd);
    }
    const tk=await DB.get('tk');if(tk)for(const k in tk)App.s.topicKeys[k]=b64d(tk[k]);
    const nk=await DB.get('nk');if(nk)for(const k in nk)App.s.nostrKeys[k]=b64d(nk[k]);
    await KTL.load();await Nostr.connect();
    for(let i=0;i<App.s.conversations.length;i++){
      const conv=App.s.conversations[i];
      if(App.s.topicKeys[conv.id]&&App.s.nostrKeys[conv.id]){
        await Nostr.subscribe(conv.id,App.s.topicKeys[conv.id],App.s.nostrKeys[conv.id],function(d){Act.handleIn(conv.id,d,'nostr');});
      }
    }
    setState({page:'conversations'});
  },
  async addContact(contactUserId,name,bundleJson){
    const id=App.s.identity;
    let theirPub;
    if(bundleJson){try{theirPub=typeof bundleJson==='string'?JSON.parse(bundleJson):bundleJson;}catch(e){throw new Error('Invalid bundle JSON');}}
    else{theirPub=await Act._fetchBundle(contactUserId);if(!theirPub)throw new Error('Contact not found on Nostr.\nAsk them to share their Bundle JSON from their Identity screen.');}
    const res=await X3DH.send(id.priv.ikPriv,theirPub);
    const topicKey=await CE.hkdf(res.sharedKey,new Uint8Array(32),'VOID_TOPIC_KEY_v3',32);
    const nostrKey=await CE.hkdf(res.sharedKey,new Uint8Array(32),'VOID_NOSTR_KEY_v3',32);
    CE.wipe(res.sharedKey);
    const convId=uid();
    const ratchet=new Ratchet();
    await ratchet.initS(await CE.hkdf(topicKey,new Uint8Array(32),'VOID_RATCHET_SEED',32),theirPub.spkPub);
    const discKey=await CE.hmac(hexd(contactUserId),new TextEncoder().encode('VOID_DISC_v3'));
    const discEncKey=await CE.hkdf(discKey,new Uint8Array(32),'VOID_DISC_ENC',32);
    await Nostr.publish(discKey,discEncKey,{type:'x3dh_init',convId:convId,from:id.userId,ikPub:id.pub.ikPub,ekPub:res.ekPub,opkIdx:res.opkIdx,ts:now()}).catch(function(){});
    const contact={id:contactUserId,name:name,pub:theirPub,addedAt:now()};
    const conv={id:convId,contactId:contactUserId,createdAt:now(),lastText:'',lastTs:0,ttl:App.s.defaultTtl||86400};
    App.s.contacts.push(contact);App.s.conversations.push(conv);
    App.s.ratchets[convId]=ratchet;App.s.topicKeys[convId]=topicKey;App.s.nostrKeys[convId]=nostrKey;
    await Nostr.subscribe(convId,topicKey,nostrKey,function(d){Act.handleIn(convId,d,'nostr');});
    await persist();
  },
  async _fetchBundle(userId){
    // Derive the SAME topic and key that publishSelf uses
    const topicInput=new TextEncoder().encode('VOID_BUNDLE_v3:'+userId);
    const topicHash=hexe(await CE.sha256(topicInput));
    const keyInput=new TextEncoder().encode('VOID_BUNDLE_ENC:'+userId);
    const encKey=await CE.sha256(keyInput);

    return new Promise(async function(res){
      let found=false;
      const tmpId='tmp_'+uid();

      // Register subscription handler
      Nostr._subs[tmpId]={
        topic:topicHash,
        key:encKey,
        cb:async function(data){
          if(data.type==='self_pub'&&data.userId===userId&&!found){
            found=true;
            delete Nostr._subs[tmpId];
            res(data.pub);
          }
        }
      };

      // Query ALL connected relays immediately
      function queryRelays(){
        let queried=0;
        for(const url in Nostr._ws){
          const ws=Nostr._ws[url];
          if(ws.readyState===1){
            ws.send(JSON.stringify(['REQ',tmpId,{kinds:[30078],'#d':[topicHash],limit:5}]));
            queried++;
          }
        }
        return queried;
      }

      // First attempt immediately
      const firstCount=queryRelays();

      // If no relays connected yet, wait for them and retry
      if(firstCount===0){
        let retries=0;
        const retryInterval=setInterval(function(){
          retries++;
          const n=queryRelays();
          if(n>0||retries>8)clearInterval(retryInterval);
        },1500);
      }

      // Also retry every 3 seconds in case relay was slow
      const retryTimer=setInterval(function(){
        if(!found)queryRelays();
      },3000);

      // 20 second total timeout
      setTimeout(function(){
        clearInterval(retryTimer);
        if(!found){delete Nostr._subs[tmpId];res(null);}
      },20000);
    });
  },
  async send(convId,text){
    const conv=App.s.conversations.find(function(c){return c.id===convId;});
    const contact=App.s.contacts.find(function(c){return c.id===(conv&&conv.contactId);});
    if(!conv||!contact)throw new Error('Conversation not found');
    const ratchet=App.s.ratchets[convId];if(!ratchet)throw new Error('No crypto session — was this conversation set up correctly?');
    const encrypted=await ratchet.enc(text);
    const payload={type:'message',convId:convId,from:App.s.identity.userId,msg:encrypted,ts:now(),ttl:conv.ttl||86400};
    const p2pSent=P2P.send(convId,payload);
    if(App.s.topicKeys[convId]&&App.s.nostrKeys[convId]){
      const delay=ri(V.minDelay,V.maxDelay);
      setTimeout(async function(){try{await Nostr.publish(App.s.topicKeys[convId],App.s.nostrKeys[convId],payload);}catch(e){}},delay);
    }
    const ttl=conv.ttl||86400;
    const dbMsg={id:uid(),convId:convId,sender:App.s.identity.userId,text:text,ts:now(),burnAt:ttl>0?now()+ttl*1000:null,via:p2pSent?'p2p':'nostr'};
    await DB.putMsg(dbMsg);
    conv.lastText=text.slice(0,50);conv.lastTs=dbMsg.ts;
    await persist();return dbMsg;
  },
  async handleIn(convId,data,via){
    if(!data)return;
    if(data.type==='x3dh_init'&&data.from){
      const already=App.s.conversations.find(function(c){return App.s.contacts.find(function(ct){return ct.id===data.from;});});
      if(!already){
        try{
          const res=await X3DH.recv(App.s.identity.priv,data.ikPub,data.ekPub,data.opkIdx);
          const topicKey=await CE.hkdf(res.sharedKey,new Uint8Array(32),'VOID_TOPIC_KEY_v3',32);
          const nostrKey=await CE.hkdf(res.sharedKey,new Uint8Array(32),'VOID_NOSTR_KEY_v3',32);
          const seed=await CE.hkdf(res.sharedKey,new Uint8Array(32),'VOID_RATCHET_SEED',32);
          CE.wipe(res.sharedKey);
          const ratchet=new Ratchet();
          await ratchet.initR(seed,App.s.identity.priv.spkPriv,App.s.identity.pub.spkPub);
          const contact={id:data.from,name:data.from.slice(0,10)+'...',addedAt:now()};
          const conv={id:data.convId,contactId:data.from,createdAt:now(),lastText:'',lastTs:0,ttl:App.s.defaultTtl||86400};
          App.s.contacts.push(contact);App.s.conversations.push(conv);
          App.s.ratchets[data.convId]=ratchet;App.s.topicKeys[data.convId]=topicKey;App.s.nostrKeys[data.convId]=nostrKey;
          await Nostr.subscribe(data.convId,topicKey,nostrKey,function(d){Act.handleIn(data.convId,d,'nostr');});
          await persist();snack('📨 New contact: '+contact.name);
          if(App.s.page==='conversations')App.re();
        }catch(e){console.warn('X3DH recv:',e.message);}
      }return;
    }
    if(data.type!=='message')return;
    const conv=App.s.conversations.find(function(c){return c.id===convId;});if(!conv)return;
    const ratchet=App.s.ratchets[convId];if(!ratchet)return;
    try{
      const existing=await DB.getMsgs(convId);
      const isDup=existing.some(function(m){return m.sender===data.from&&Math.abs(m.ts-data.ts)<3000;});
      if(isDup)return;
      const text=await ratchet.dec(data.msg);
      const ttl=data.ttl||86400;
      const dbMsg={id:uid(),convId:convId,sender:data.from,text:text,ts:data.ts||now(),burnAt:ttl>0?now()+ttl*1000:null,via:via};
      await DB.putMsg(dbMsg);conv.lastText=text.slice(0,50);conv.lastTs=dbMsg.ts;await persist();
      if(App.s.page==='chat'&&App.s.activeConvId===convId){App.re();}
      else{App.s.unread[convId]=(App.s.unread[convId]||0)+1;if(App.s.page==='conversations')App.re();}
    }catch(e){console.warn('decrypt:',e.message);}
  }
};

// ── publishSelf: broadcast our key bundle to all relays ──────────────────────
// Topic = SHA256("VOID_BUNDLE_v3" + userId) — stable, predictable from userId alone
// Key  = HKDF(SHA256(userId), "VOID_BUNDLE_ENC") — derivable by anyone with userId
// Kind 30078 (parameterized replaceable) — relays persist the latest version
// This means your bundle stays on relays even when you're offline
async function publishSelf(){
  const id=App.s.identity;if(!id)return;
  try{
    // Stable topic hash: anyone with your userId can compute this
    const topicInput=new TextEncoder().encode('VOID_BUNDLE_v3:'+id.userId);
    const topicHash=hexe(await CE.sha256(topicInput));
    // Encryption key derivable from userId (bundle is public key material anyway)
    const keyInput=new TextEncoder().encode('VOID_BUNDLE_ENC:'+id.userId);
    const encKey=await CE.sha256(keyInput); // simple SHA256 — key is public by design
    // Use publishDirect: send to ALL relays, same topic, so it persists everywhere
    await Nostr.publishDirect(topicHash,encKey,{
      type:'self_pub',
      userId:id.userId,
      pub:id.pub,
      ts:now(),
    });
  }catch(e){console.warn('publishSelf:',e.message);}
}

  App.s.p2pStates[convId]=state;

  App.re();
};

    const bndlI=mk('textarea',{cls:'inp',placeholder:'{"ikPub":"...","spkPub":"...",...}  ← Bundle JSON here if needed',sty:{fontFamily:'var(--mono)',fontSize:'10px',height:'80px'}});

  chat:function(){
    const s=mk('div',{cls:'screen'});
    const cid=App.s.activeConvId;
    const conv=App.s.conversations.find(function(c){return c.id===cid;});
    const ct=App.s.contacts.find(function(c){return c.id===(conv&&conv.contactId);});
    const p2p=App.s.p2pStates[cid]==='connected';
    const wBtn=iBtn(IC.trash,async function(){
      if(!confirm('Wipe all messages in this conversation?'))return;
      const msgs=await DB.getMsgs(cid);for(let i=0;i<msgs.length;i++)await DB.delMsg(msgs[i].id);
      renderMsgs([]);
    },'Wipe');wBtn.style.color='var(--red)';
    const p2pBtn=iBtn(IC.link,function(){Pages._p2pDlg(cid);},'WebRTC P2P');
    s.appendChild(topbar(ct?ct.name:'Unknown',null,function(){setState({page:'conversations',activeConvId:null});},[ p2pBtn,wBtn]));
    const sub=mk('div',{cls:'pbar'});
    sub.appendChild(mk('span',{cls:'badge '+(p2p?'bok':'bwn')},p2p?'⚡ P2P DIRECT':'◌ ASYNC RELAY'));
    sub.appendChild(mk('span',{sty:{flex:'1',color:'var(--mut)',fontSize:'11px',marginLeft:'8px'}},p2p?'Zero relay — maximum privacy':'Nostr relay — encrypted, relay sees ciphertext only'));
    s.appendChild(sub);
    const ma=mk('div',{cls:'ma'});s.appendChild(ma);
    function renderMsgs(msgs){
      ma.innerHTML='';
      if(!msgs.length){
        const ph=mk('div',{sty:{textAlign:'center',padding:'40px 0',color:'var(--mut)',fontSize:'13px',lineHeight:'1.8'}});
        ph.appendChild(mk('div',{sty:{fontSize:'32px',marginBottom:'12px'}},'🔐'));
        ph.appendChild(document.createTextNode('End-to-end encrypted.\nEvery message uses a unique key.'));
        ma.appendChild(ph);return;
      }
      msgs.forEach(function(m){
        const sent=m.sender===App.s.identity.userId;
        const row=mk('div',{cls:'mr '+(sent?'sent':'recv')});
        const wrap=mk('div');
        wrap.appendChild(mk('div',{cls:'mb '+(sent?'sent':'recv')},m.text));
        const mm=mk('div',{cls:'mm'});
        mm.appendChild(document.createTextNode(fmtTime(m.ts)));
        if(sent)mm.appendChild(mk('span',{sty:{color:'var(--grn)'}},'✓'));
        if(m.via)mm.appendChild(mk('span',{sty:{color:m.via==='p2p'?'var(--grn)':'var(--mut)'}},m.via==='p2p'?'⚡':'◌'));
        if(m.burnAt){const rem=Math.max(0,Math.round((m.burnAt-now())/1000));mm.appendChild(mk('span',{sty:{color:'var(--red)'}},('🔥'+rem+'s')));}
        wrap.appendChild(mm);row.appendChild(wrap);ma.appendChild(row);
      });
      requestAnimationFrame(function(){ma.scrollTop=ma.scrollHeight;});
    }
    const _orig=Act.handleIn;
    Act.handleIn=async function(convId,data,via){
      await _orig.call(Act,convId,data,via);
      if(convId===cid){const msgs=await DB.getMsgs(cid);renderMsgs(msgs);}
    };
    (async function(){const msgs=await DB.getMsgs(cid);renderMsgs(msgs);const u=App.s.unread;delete u[cid];App.s.unread=u;}());
    const mbar=mk('div',{cls:'mbar'});
    const stegI=document.createElement('input');stegI.type='file';stegI.accept='image/png,image/jpeg';stegI.style.display='none';
    stegI.addEventListener('change',function(){if(stegI.files[0]){Pages._stegDlg(stegI.files[0],cid,async function(){const ms=await DB.getMsgs(cid);renderMsgs(ms);});stegI.value='';}});
    const stegB=iBtn(IC.img,function(){stegI.click();},'Hide message in image');stegB.style.color='var(--mut)';
    mbar.appendChild(stegI);mbar.appendChild(stegB);
    const ta=mk('textarea',{cls:'mta',placeholder:'Message...',rows:'1'});
    ta.addEventListener('input',function(){ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,120)+'px';});
    let sending=false;
    const sb=mk('button',{cls:'sb'});sb.appendChild(svgEl(IC.send,16));sb.disabled=true;
    ta.addEventListener('input',function(){sb.disabled=!ta.value.trim();});
    ta.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sb.onclick();}});
    sb.onclick=async function(){
      const txt=ta.value.trim();if(!txt||sending)return;
      sending=true;sb.disabled=true;ta.value='';ta.style.height='auto';
      try{await Act.send(cid,txt);const ms=await DB.getMsgs(cid);renderMsgs(ms);}
      catch(e){snack('Send failed: '+e.message);}
      finally{sending=false;}
    };
    mbar.appendChild(ta);mbar.appendChild(sb);s.appendChild(mbar);return s;
  },
  _p2pDlg:function(cid){

      catch(e){snack('Error: '+e.message);applyBtn.textContent='Apply Answer';applyBtn.disabled=false;}

    let rcvBusy=false;

  _stegDlg:function(file,cid,onDone){
    const ov=mk('div',{sty:{position:'fixed',inset:'0',background:'rgba(0,0,0,.88)',zIndex:'1000',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}});
    const card=mk('div',{cls:'card',sty:{width:'100%',maxWidth:'360px',display:'flex',flexDirection:'column',gap:'12px'}});
    card.appendChild(mk('h3',{},'🖼 Hide Message in Image'));
    card.appendChild(mk('p',{sty:{color:'var(--mut)',fontSize:'13px',lineHeight:'1.6'}},'Encrypts your message and hides it inside the image. Send the downloaded PNG through any channel.'));
    const ta=mk('textarea',{cls:'inp',placeholder:'Secret message...',rows:'3'});card.appendChild(ta);
    const row=mk('div',{sty:{display:'flex',gap:'8px'}});
    const cancelBtn=mk('button',{cls:'btn bs',sty:{flex:'1'}});cancelBtn.textContent='Cancel';cancelBtn.onclick=function(){ov.remove();};
    const encBtn=mk('button',{cls:'btn bp',sty:{flex:'1'}});encBtn.textContent='Encode & Download';
    encBtn.onclick=async function(){
      if(!ta.value.trim())return snack('Enter a message to hide');
      const r=App.s.ratchets[cid];if(!r)return snack('No crypto session');
      encBtn.innerHTML='';encBtn.appendChild(spin());encBtn.disabled=true;
      try{
        const enc=await r.enc('[steg]'+ta.value.trim());await persist();
        const blob=await Steg.encode(file,JSON.stringify(enc));
        const msg={id:uid(),convId:cid,sender:App.s.identity.userId,text:'📷 [Steganographic image created]',ts:now(),burnAt:null,via:'steg'};
        await DB.putMsg(msg);ov.remove();onDone();
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');a.href=url;a.download='void_steg_'+Date.now()+'.png';a.click();
        setTimeout(function(){URL.revokeObjectURL(url);},2000);
        snack('Image downloaded — send it to your contact');
      }catch(e){snack('Error: '+e.message);encBtn.textContent='Encode & Download';encBtn.disabled=false;}
    };
    row.appendChild(cancelBtn);row.appendChild(encBtn);card.appendChild(row);
    ov.appendChild(card);document.body.appendChild(ov);
  },

// ── Boot (with full error recovery) ──────────────────────────────────────────
async function boot(){
  try{
    Panic.init();
    setInterval(function(){DB.purge();},60000);
    // Dummy traffic for metadata resistance
    setInterval(async function(){
      if(Nostr.connectedCount===0||!App.s.identity)return;
      try{
        const fk=rnd(32),fp=rnd(ri(64,512));
        const ct=await CE.aenc(fk,fp);
        const fTopic=hexe(await CE.sha256(rnd(16)));
        const content=b64e(ct);
        const created=Math.floor(now()/1000);
        const pubHex=Nostr._pubKey?hexe(Nostr._pubKey):hexe(rnd(32));
        const idStr=JSON.stringify([0,pubHex,created,30078,[['d',fTopic]],content]);
        const idB=await CE.sha256(idStr);
        let sigHex='0'.repeat(128);
        if(Nostr._privKey)try{sigHex=hexe(await K256.sign(Nostr._privKey,idB));}catch(e){}
        const evt={id:hexe(idB),pubkey:pubHex,created_at:created,kind:30078,tags:[['d',fTopic]],content:content,sig:sigHex};
        const msg=JSON.stringify(['EVENT',evt]);
        for(const url in Nostr._ws){const w=Nostr._ws[url];if(w.readyState===1)try{w.send(msg);}catch(e){}}
      }catch(e){}
    },V.dummyMs+ri(-2000,2000));
    App.re();
    const hasSalt=await DB.get('salt');
    if(!hasSalt)setState({page:'onboarding'});
    else setState({page:'unlock'});
  }catch(e){
    // Show error on screen instead of silent black page
    const app=document.getElementById('app');
    if(app){
      app.innerHTML='<div style="padding:32px;color:#FF4466;font-family:monospace;font-size:13px;line-height:1.8">'
        +'<div style="font-size:24px;margin-bottom:16px">VOID — Error on startup</div>'
        +'<div>'+e.message+'</div>'
        +'<div style="margin-top:16px;color:#6B6B80">Your browser may not support WebCrypto API.<br>'
        +'Try Chrome, Firefox, or Samsung Internet 14+.<br>'
        +'On iOS: requires Safari 15.4+ or Chrome.</div>'
        +'<button onclick="location.reload()" style="margin-top:24px;padding:12px 20px;background:#6C63FF;color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:14px">Retry</button>'
        +'</div>';
    }
  }
}
boot();
